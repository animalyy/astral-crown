<!doctype html>
<html lang="ja">
<head>

<style>
:root{--bg:#07101e;--bg2:#0c1730;--panel:#101c3a;--line:#2b3e75;--text:#eef4ff;--sub:#90a9dc;--muted:#6176a6;--emp:#e05050;--fed:#4a8fe8;--neu:#d4c840;--ok:#57cf83;--warn:#efaa45;--bad:#df6262;--cult:#a060e8;--corp:#50b868;--safeT:env(safe-area-inset-top);--safeB:env(safe-area-inset-bottom)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{height:100%;margin:0;background:#050b17;color:var(--text);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;overflow:hidden} button,input,select{font:inherit} body{display:flex;justify-content:center}
#app{position:relative;width:100%;max-width:460px;height:100dvh;overflow:hidden;background:radial-gradient(ellipse at 20% 0%,rgba(214,174,83,.14),transparent 26%),radial-gradient(ellipse at 85% 10%,rgba(103,182,239,.12),transparent 24%),radial-gradient(ellipse at 50% 100%,rgba(120,90,180,.10),transparent 30%),linear-gradient(180deg,#06111f 0%,#0a1530 48%,#08101d 100%)}
#stars{position:absolute;inset:0;pointer-events:none;z-index:0}.star{position:absolute;border-radius:50%;background:#fff;opacity:.55;animation:tw 3s ease-in-out infinite}@keyframes tw{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.75;transform:scale(1.3)}}
.hide{display:none!important}.top{position:absolute;left:0;right:0;top:0;height:112px;padding:calc(8px + var(--safeT)) 10px 8px;background:rgba(4,10,22,.84);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.07);z-index:25}.main{position:absolute;left:0;right:0;top:112px;bottom:68px;padding:8px;overflow:hidden;z-index:10}.nav{position:absolute;left:0;right:0;bottom:0;height:68px;padding:7px 6px calc(7px + var(--safeB));display:grid;grid-template-columns:repeat(6,1fr);gap:6px;background:rgba(4,10,22,.9);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08);z-index:25}.nav button{border:none;border-radius:12px;background:rgba(255,255,255,.04);color:var(--sub);font-weight:700;font-size:10px}.nav button.on{background:linear-gradient(180deg,#30427e,#1d2d5d);color:#fff;box-shadow:0 0 0 1px rgba(130,160,255,.2) inset}
.row{display:flex;align-items:center;gap:7px}.bet{justify-content:space-between}.wrap{flex-wrap:wrap}.f1{flex:1;min-width:0}.title{font-size:16px;font-weight:800;letter-spacing:.03em}.sub{color:var(--sub)}.mono{font-variant-numeric:tabular-nums}.badge,.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:10px;color:var(--sub)}.tag.emp{color:var(--emp);border-color:rgba(224,80,80,.35)}.tag.fed{color:var(--fed);border-color:rgba(74,143,232,.35)}.tag.cult{color:var(--cult);border-color:rgba(160,96,232,.35)}.tag.corp{color:var(--corp);border-color:rgba(80,184,104,.35)}.tag.ok{color:var(--ok)}.tag.warn{color:var(--warn)}.tag.bad{color:var(--bad)}
.hud{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:8px}.stat{padding:5px 6px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}.stat b{display:block;font-size:9px;color:var(--sub);font-weight:700}.stat span{display:block;font-weight:800;font-size:14px}
.screen{display:none;height:100%}.screen.on{display:block}.stack{display:grid;gap:7px;height:100%}.stack.home{grid-template-rows:auto auto 1fr auto auto;overflow:hidden}.stack.tall{grid-template-rows:auto 1fr auto}.stack.dom{grid-template-rows:auto auto 1fr}.card{position:relative;padding:10px;border-radius:16px;overflow:hidden;background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08)}.btn{min-height:38px;padding:8px 10px;border:none;border-radius:13px;font-weight:800;color:#fff;background:linear-gradient(180deg,#2d3f7d,#1d2e5e)}.btn.g{background:rgba(255,255,255,.05);box-shadow:0 0 0 1px rgba(255,255,255,.08) inset}.btn.emp{background:linear-gradient(180deg,#6a4e9b,#483276)}.btn.warn{background:linear-gradient(180deg,#874123,#643019)}.btn.sm{min-height:30px;padding:5px 8px;font-size:11px;border-radius:11px}.btn:disabled{opacity:.45}.btn:active{transform:scale(.98)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.list{display:grid;gap:7px}.scroll{overflow:auto;min-height:0}.scroll::-webkit-scrollbar{width:3px;height:3px}.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:999px}.item{padding:9px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}.port{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-weight:800;background:linear-gradient(160deg,#30427a,#1f2f5b);border:1px solid rgba(255,255,255,.1)}.bar{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar>span{display:block;height:100%;border-radius:999px}.bar.ok>span{background:linear-gradient(90deg,#3ebf71,#60df95)}.bar.warn>span{background:linear-gradient(90deg,#dc8839,#f0b05a)}.bar.bad>span{background:linear-gradient(90deg,#cc4b4b,#f07070)}.bar.blue>span{background:linear-gradient(90deg,#428dd7,#6ec7ff)}.bar.cult>span{background:linear-gradient(90deg,#8d54e3,#c186ff)}.bar.corp>span{background:linear-gradient(90deg,#49c5b0,#8ff3df)}
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.kpi .card{padding:7px}.kpi b{display:block;font-size:9px;color:var(--sub)}.kpi span{font-size:15px;font-weight:800}
#mapWrap{position:relative;border-radius:14px;overflow:visible;background:radial-gradient(circle at 50% 50%,rgba(100,120,220,.10),transparent 38%),linear-gradient(180deg,#050d1a,#0d1731)}#mapSvg{width:100%;height:auto;display:block;border-radius:14px}.link{stroke:#4660a0;stroke-opacity:.55;stroke-width:2}.link.hot{stroke:#d6ae53;stroke-opacity:.75;stroke-dasharray:5 4}.sectorCore{cursor:pointer;transition:filter .15s ease}.sectorCore.emp{fill:#3a1010;stroke:#e05050}.sectorCore.fed{fill:#101830;stroke:#4a8fe8}.sectorCore.neu{fill:#2a2810;stroke:#d4c840}.sectorCore.cult{fill:#241335;stroke:#b177ff}.sectorCore.corp{fill:#112922;stroke:#53d59c}.sectorCore.core{stroke-width:3}.sectorCore.trade{filter:drop-shadow(0 0 8px rgba(90,255,220,.22))}.sectorCore.fort{filter:drop-shadow(0 0 8px rgba(214,174,83,.18))}.sectorLabel{font-size:10px;fill:#ebf0ff;font-weight:700;text-anchor:middle;pointer-events:none}.sectorSub{font-size:8px;fill:#90a9dc;text-anchor:middle;pointer-events:none}.miniMapLegend{position:absolute;right:7px;top:7px;display:grid;gap:4px;z-index:2}
.pop,.ov{position:absolute;inset:0;display:none;z-index:60}.pop.on,.ov.on{display:block}.dim{position:absolute;inset:0;background:rgba(0,0,0,.58);z-index:0}.panel{position:absolute;left:0;right:0;bottom:0;max-width:460px;margin:0 auto;max-height:88dvh;overflow:auto;background:linear-gradient(180deg,#121e44,#0c1631);border:1px solid rgba(255,255,255,.09);border-top-left-radius:22px;border-top-right-radius:22px;padding:14px 12px calc(16px + var(--safeB));z-index:1}.ov .panel{top:0;bottom:0;border-radius:0;max-height:none;padding-top:calc(12px + var(--safeT))}.banner{padding:10px 11px;border-radius:14px;background:linear-gradient(90deg,rgba(214,174,83,.14),rgba(103,182,239,.09));border:1px solid rgba(255,255,255,.09);font-size:14px;line-height:1.55}.choiceChip{padding:6px 8px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:11px}.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);padding:8px 14px;border-radius:999px;background:rgba(7,12,24,.95);border:1px solid rgba(120,150,230,.28);font-size:12px;z-index:9000;opacity:0;transition:.35s}
.heroMini{min-height:94px;border-radius:14px;border:1px solid rgba(255,255,255,.08);overflow:hidden;background:radial-gradient(circle at 20% 24%,rgba(255,255,255,.14),transparent 18%),radial-gradient(circle at 78% 28%,rgba(255,255,255,.10),transparent 14%),linear-gradient(135deg,#0f1c3d,#1e2d60 55%,#0a1330)}.heroMini.emp{background:radial-gradient(circle at 20% 24%,rgba(255,230,180,.16),transparent 18%),radial-gradient(circle at 78% 28%,rgba(255,180,110,.10),transparent 14%),linear-gradient(135deg,#24190a,#5a3f13 45%,#1a142d)}.heroMini.fed{background:radial-gradient(circle at 20% 24%,rgba(180,235,255,.16),transparent 18%),radial-gradient(circle at 78% 28%,rgba(130,220,255,.10),transparent 14%),linear-gradient(135deg,#0b1f34,#143c68 45%,#131f44)}.heroMini.cult{background:radial-gradient(circle at 20% 24%,rgba(225,180,255,.16),transparent 18%),radial-gradient(circle at 78% 28%,rgba(190,140,255,.10),transparent 14%),linear-gradient(135deg,#181028,#4a2670 48%,#110d21)}.heroMini.corp{background:radial-gradient(circle at 20% 24%,rgba(180,255,240,.16),transparent 18%),radial-gradient(circle at 78% 28%,rgba(140,255,220,.10),transparent 14%),linear-gradient(135deg,#092220,#0d5248 48%,#0d1a29)}.heroMiniInner{padding:10px 12px}.heroMiniTitle{font-size:14px;font-weight:900}.heroMiniText{font-size:13px;line-height:1.72;color:#dce7ff;margin-top:7px}.smallHelp{font-size:11px;line-height:1.78;color:#9bb2df}
#intro{position:absolute;inset:0;z-index:65;background:linear-gradient(180deg,#050912,#0b1230 55%,#0c1632);overflow:hidden}#introTextWrap{position:absolute;inset:0;overflow:hidden}#introText{position:absolute;left:10%;right:10%;top:100%;display:grid;gap:32px;padding-bottom:60vh}.introFadeTop{position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(180deg,#050912 0%,transparent 100%);z-index:3;pointer-events:none}.introFadeBottom{position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(0deg,#050912 0%,transparent 100%);z-index:3;pointer-events:none}
</style>
</head>
<body>
<div id="app">
<div id="stars"></div>
<div id="start" class="screen on" style="position:absolute;inset:0;z-index:70;overflow-y:auto;background:linear-gradient(160deg,#060c1a 0%,#0d1a30 50%,#060c1a 100%)">
<div style="position:relative;z-index:1;padding:24px 18px 36px;display:flex;flex-direction:column;gap:18px;min-height:100%">
<div style="text-align:center;padding:32px 0 16px"><div style="font-size:11px;letter-spacing:.35em;color:#7090b0;margin-bottom:16px;font-weight:600">STELLAR CHRONICLE</div><div style="font-size:42px;font-weight:900;line-height:1.05;letter-spacing:.04em;color:#fff;text-shadow:0 0 60px rgba(180,140,60,.5)">星暦戦記</div><div style="font-size:26px;font-weight:900;color:var(--emp);letter-spacing:.08em;margin-top:6px;text-shadow:0 0 40px rgba(200,144,42,.6)">アストラル・クラウン</div><div style="margin-top:18px;font-size:13px;color:#8aa0c0;line-height:1.8;letter-spacing:.04em">帝国と同盟、教団と企業。<br>12宙域の覇権を争う一画面戦略劇。</div></div>
<div class="card"><div class="row bet"><div><div style="font-weight:800">音楽</div><div class="sub">ボレロ</div></div><div class="g2" style="width:160px"><button id="titleBgmOn" class="btn sm" onclick="setTitleBgm(true)">ON</button><button id="titleBgmOff" class="btn sm g" onclick="setTitleBgm(false)">OFF</button></div></div></div>
<div style="display:flex;flex-direction:column;gap:12px"><div style="font-size:10px;letter-spacing:.2em;color:#556;text-align:center;font-weight:700">- 陣営を選べ -</div>
<button onclick="newGame('emp')" style="all:unset;display:block;background:linear-gradient(135deg,rgba(180,100,20,.22),rgba(200,144,42,.10));border:1px solid rgba(200,144,42,.4);border-radius:16px;padding:20px;cursor:pointer"><div style="font-size:11px;letter-spacing:.2em;color:#c8902a;font-weight:700;margin-bottom:8px">IMPERIAL FACTION</div><div style="font-size:22px;font-weight:900;color:#fff">帝国</div><div style="font-size:12px;color:#a08060;margin-top:8px;line-height:1.6">速く、強く、そして腐りやすい。<br>秩序による統一を急ぐ覇道の国家。</div></button>
<button onclick="newGame('fed')" style="all:unset;display:block;background:linear-gradient(135deg,rgba(40,80,160,.22),rgba(60,120,200,.10));border:1px solid rgba(74,159,214,.4);border-radius:16px;padding:20px;cursor:pointer"><div style="font-size:11px;letter-spacing:.2em;color:#4a9fd6;font-weight:700;margin-bottom:8px">FEDERATION FACTION</div><div style="font-size:22px;font-weight:900;color:#fff">同盟</div><div style="font-size:12px;color:#6090b0;margin-top:8px;line-height:1.6">慎重で、粘り強く、支持を糧に戦う。<br>民主制の理念が武器になる連邦国家。</div></button>
</div>
<div class="card"><div class="row bet"><div><div style="font-weight:800">記録</div><div class="sub">クイック保存</div></div><div class="g2" style="width:160px"><button class="btn sm g" onclick="loadGame()">読込</button><button class="btn sm warn" onclick="wipeSave()">削除</button></div></div></div>
</div></div>
<div id="intro" class="hide"><div class="introFadeTop"></div><div class="introFadeBottom"></div><div id="introTextWrap"><div id="introText"></div></div><div class="card" style="position:absolute;left:12px;right:12px;bottom:12px;z-index:10"><div class="g2"><button class="btn g" onclick="skipIntro()">スキップ</button><button class="btn" onclick="skipIntro()">戦場へ</button></div></div></div>
<header id="top" class="top hide"><div class="row bet"><div><div class="title" id="hTitle">-</div><div class="sub mono" id="hSub">-</div></div><div class="row"><span class="badge" id="saveMark">未保存</span><button class="btn sm g" onclick="showScreen('set')">保存</button></div></div><div class="hud"><div class="stat"><b>資金</b><span id="vMoney">0</span></div><div class="stat"><b>戦意</b><span id="vWar">0</span></div><div class="stat"><b>正統性</b><span id="vLeg">0</span></div><div class="stat"><b id="vGaugeLabel">支持率</b><span id="vGauge">0</span></div><div class="stat"><b>行動</b><span id="vAP">0</span></div></div></header>
<main id="main" class="main hide">
<section id="scr-home" class="screen on"><div class="stack home"><div class="banner" id="headline">-</div><div class="kpi"><div class="card"><b>支配宙域</b><span id="vOwn">0/12</span></div><div class="card"><b>軍圧</b><span id="vPressure">0</span></div><div class="card"><b>再編</b><span id="vReform">0</span></div><div class="card"><b>危機</b><span id="vDanger">0</span></div></div><div class="card scroll" style="padding:8px"><div id="mapWrap"><svg id="mapSvg" viewBox="27 36 388 210"></svg><div class="miniMapLegend"><span class="tag emp">帝国</span><span class="tag fed">同盟</span><span class="tag cult">教団</span><span class="tag corp">企業</span></div></div></div><div class="card" style="padding:8px"><div class="row bet" style="margin-bottom:8px"><div class="f1"><div class="sub" id="advice">-</div></div><button class="btn sm emp" onclick="nextTurn()">次ターン</button></div><div class="g4"><button class="btn sm" onclick="openPolicies()">政策</button><button class="btn sm g" onclick="openIntel()">諜報</button><button class="btn sm g" onclick="openWeapon()">巨大兵器</button><button class="btn sm g" onclick="showScreen('rec')">記録</button></div></div><div class="card"><div class="row wrap" id="recentChoices"></div></div></div></section>
<section id="scr-war" class="screen"><div class="stack tall"><div class="card"><div class="row bet"><div class="title" style="font-size:14px">艦隊と前線</div></div><div class="smallHelp" style="margin-top:8px">戦闘命令は突破、迎撃、攪乱の3種類です。会戦勝利と占領成功は別判定です。</div></div><div class="card scroll list" id="fleetList"></div><div class="card"><div class="sub">占領艦隊と突破艦隊を連携させると、中枢や要塞の制圧率が上がります。</div></div></div></section>
<section id="scr-dom" class="screen"><div class="stack dom"><div class="kpi"><div class="card"><b>国力</b><span id="vPower">0</span></div><div class="card"><b>信用</b><span id="vCredit">0</span></div><div class="card"><b>教団脅威</b><span id="vCultThreat">0</span></div><div class="card"><b>企業脅威</b><span id="vCorpThreat">0</span></div></div><div class="card" id="policyMini"></div><div class="card scroll" id="domDetail"></div></div></section>
<section id="scr-rec" class="screen"><div class="stack tall"><div class="card scroll" id="recLog"></div><div class="card"><div class="sub" id="routeText">-</div></div></div></section>
<section id="scr-set" class="screen"><div class="stack home"><div class="card"><div class="title" style="font-size:14px">保存</div><div class="g2" style="margin-top:8px"><button class="btn sm" onclick="saveGame()">クイック保存</button><button class="btn sm g" onclick="loadGame()">クイック読込</button></div></div><div class="card"><div class="title" style="font-size:14px">演出</div><div class="g2" style="margin-top:8px"><button class="btn sm g" onclick="toggleBgm()" id="bgmBtn">ボレロ: OFF</button><button class="btn sm g" onclick="openHelp()">方針</button></div></div><div class="card"><div class="sub">エピソード本文はそのままに、ゲーム側の判断の重さを強めた実装です。</div></div></div></section>
</main>
<nav id="nav" class="nav hide"><button class="on" onclick="showScreen('home',this)">総覧</button><button onclick="showScreen('war',this)">軍事</button><button onclick="showScreen('dom',this)">内政</button><button onclick="showScreen('rec',this)">記録</button><button onclick="showScreen('set',this)">設定</button><button onclick="openHelp()">案内</button></nav>
<div id="modal" class="pop"><div class="dim" onclick="closeModal()"></div><div class="panel" id="modalBody"></div></div>
<div id="battle" class="ov"><div class="panel" id="battleBody"></div></div>
<div id="toast" class="toast"></div>
</div>

エーヴェルトは、崩れない勝ち方を重視する。補給を壊し、属州を疲弊させ、帝都にだけ成果を集めるような勝利は、次の反乱の種にすぎないと見る。彼にとって勝利とは、戦場だけでなく統治まで含めて成立していなければならない。 また、情報総監ヘルマン・シュトラウスは、前線のさらに奥を見ている。神聖軌道教団。企業航路連合。この2つが、帝国と同盟の戦争を食い物にしながら、銀河全体の土台を侵食していることを知っているからだ。 帝国はいま、外敵だけと戦っているのではない。秩序を守るために生まれた国家が、その秩序の重さで自分自身を傷つけ始めている。その矛盾ごと押し切るために、帝国は戦う。`],["第5章　企業連合という第三の刃",`帝国の敵は同盟だけではない。しかも、そのもうひとつの敵は、しばしば味方の顔をして現れる。 企業航路連合。それは、複数の巨大物流企業、保険機構、ワープ門整備法人、港湾管理会社が結びついて成立した超広域経済連合体である。 彼らは国家ではない。だが、国家よりも広い航路情報を持ち、国家よりも現実的に物資を動かし、国家よりも冷徹に損得を計算する。 帝国は広大な版図を維持するため、すでに多くの補給業務を彼らに依存している。外縁宙域における食料輸送。医薬品の緊急搬送。軍需物資の中継。ワープ門修繕の優先手配。その多くは、企業連合の契約網なしには回らない。 だが企業連合は、帝国の繁栄を願っているわけではない。彼らが望むのは、長く続く不安定な均衡である。戦争が長引けば輸送需要は増え、保険料率は上がり、あらゆる遅延が利益に変わる。かといって一方が完全勝利しても困る。顧客が1つになれば、価格交渉力を失うからだ。 つまり企業連合は、帝国にも同盟にも勝たせすぎたくない。帝国から見れば、それは屈辱だった。秩序の中心であるはずの皇帝の国家が、契約書と物流網に首根っこを押さえられている。だが、現実には無視できない。それが今の銀河である。`],["第6章　なぜ帝国は戦うのか",`帝国は、ただ皇帝の威光を広げるために戦っているのではない。 もちろん威光は重要だ。建国以来、帝国の正統性は、ワープ航路を守り、銀河に秩序を供給することで成り立ってきた。勝利は単なる戦果ではなく、統治能力の証明であり、皇帝の権威そのものだった。 だが、もっと根深い理由がある。帝国は、止まれば崩れるから戦っている。 地方は疲弊し、属州の不満は積み上がり、同盟は依然として独立した政治体として存続している。教団は傷口に根を張り、企業連合は戦争の長期化で太る。こうした状況で帝国が後退すれば、銀河に帝国が必要だという建国以来の物語そのものが揺らぐ。それは、軍事的敗北より危険だ。 帝国にとって戦争とは、国境線を押し広げるためだけのものではない。帝国という国家が、自らに存在理由を与え続けるための行為でもある。 もし皇帝の国家が、銀河を統一し秩序づける資格を失ったら。そのとき帝国は、ただ巨大な官僚機構と疲れた属州の束にすぎなくなる。 だから帝国は戦う。銀河をひとつにまとめるために。そして、自分自身がまだ銀河の中心であると証明するために。この戦争は、帝国にとって野心ではない。生存の形式である。`],["第7章　開戦前夜",`地球暦3147年。銀河は再び大きな戦争の縁に立っている。 帝都では建国皇帝の威光がなお強く輝く。だがその光の下で、属州の疲労は蓄積している。 アレス・ヴァルクレインは前へ出る準備を整えた。ルーカス・エーヴェルトは、勝利の後に残るものを計算している。ヘルマン・シュトラウスは、戦場よりも深い場所で銀河が壊れていることを知っている。 帝国は統一のために戦う。帝国が負ければ、秩序そのものが失われると信じているからだ。 ワープ門が銀河をつないだはずだった。だが今、その同じ航路が、帝国と同盟を決定的にぶつけようとしている。 ここが始まりである。銀河が、再び火を噴く前夜である。 速く勝つか。正しく勝つか。勝てなかったとき、何を残すか。それがこの戦記の、すべてだ。`]];
const INTRO_FED=[["第1章　ワープ時代の辺境",`地球暦2841年。 人類は恒星間ワープ航法を実用化し、ワープ門を通じて星々をつなぎ始めた。 地球圏の人々は、それを新時代の始まりだと信じた。人口過密、資源不足、政治的停滞。そうした地球の限界を、宇宙の広さが引き受けてくれると期待したのである。 実際、最初の植民期は目覚ましかった。農業惑星、鉱業星、研究拠点、軌道都市。人類は短期間で複数の恒星系を開拓し、新たな産業圏を次々に築き上げた。ワープ門は文明の動脈となり、銀河は一気に狭くなった。 だが辺境の現実は、地球で語られる夢よりずっと重かった。ワープ門の向こうへ送られた移民の多くは、理想に燃えた開拓者ではなく、債務を抱えた労働者や、地球で押し出された人々だった。企業は契約で縛り、自治政府は治安を口実に権限を強め、生活基盤の脆弱な植民地では、ひとたび物流が止まるだけで飢えが発生した。 辺境の人々が最初に知ったのは、宇宙の自由ではない。ワープ門を握る者が、生活そのものを握るという現実だった。`],["第2章　帝国への怒り",`王冠銀河帝国は、たしかに秩序をもたらした。 航路は安定し、海賊は減り、広域物流は改善された。同盟の側にいる者であっても、その事実自体を否定はしない。帝国がなければ、初期星間社会の混乱がさらに長引いた可能性は高い。 しかし、同盟の人々が帝国に怒った理由もまた、はっきりしている。帝国は地方を守る代わりに、地方を自分たちの材料として扱ったからだ。 属州は食料を供出し、鉱物を掘り、兵員を出し、関税を差し出した。だがその見返りとして与えられたのは、十分な代表権ではなかった。総督は中央から来る。税率は中央が決める。物流の優先順位も中央が決める。地方は、支えられる側であると同時に、使われる側でもあった。 問題は、帝国がこれを当然だと思っていたことだ。怒りは、一度に生まれたのではない。長い時間をかけて蓄積された。 補給の後回し。腐敗した総督。現地事情を無視した供出割当。告発しても届かない嘆願。減税を求めれば、秩序への不満として記録される行政。こうして地方は学んでいく。帝国は、自分たちを守るためではなく、帝国を維持するために地方を使っているのではないかと。その疑念が、やがて怒りへ変わった。`],["第3章　三惑星蜂起",`自由恒星同盟の起点となったのは、3つの農業惑星だった。サフィナ、オルテラ、ネムロス。外縁農業圏に属するこの三星系は、帝国中枢へ穀物を送る重要な供給地である。 ところが、地球暦3042年。病害と磁気嵐が重なり、収穫量が大きく落ち込んだ。現地評議会が求めたのは、供出義務の一時緩和だった。これは独立宣言でも反乱でもない。餓死を避けるための現実的な申し立てにすぎなかった。 しかし帝国中央は、これを認めなかった。当時の帝国は軍制再編と帝都備蓄計画の最中にあり、地方1つの事情で全体計画を崩したくなかったからである。そこで三星系の住民たちは、供出停止と査察拒否に踏み切る。帝国は即座に鎮圧艦隊を送った。 鎮圧の過程で行われた精密爆撃が居住区へ誤着弾し、その映像が商港ネットワークを通じて広く拡散した。瓦礫の前で立ち尽くす幼い子どもの映像は、多くの辺境世界に衝撃を与えた。 この時間が決定的だった。三星系の抵抗は、単独の蜂起から、銀河各地の不満を束ねる象徴へ変わっていく。`],["第4章　自由恒星同盟の成立",`地球暦3058年。14の宙域代表が自由憲章に署名し、自由恒星同盟が成立した。 同盟は単なる反乱軍ではなかった。農業圏、商港自治圏、辺境防衛圏、学術共同体、旧植民評議会。出自も利害も異なる複数の共同体が、帝国の中央集権に対抗するため、ぎりぎりの妥協で作り上げた政治体だった。 同盟には、帝国のような単一の中心がなかった。共和中枢は政治の象徴だったが、行政、司法、補給、軍務の中枢機能は複数の宙域に分散されていた。つまり帝国が1つの首都と1つの決定線で回っているのに対し、同盟は複数の節点で成立する網の目の国家だった。 1か所を落としても全体が死なない。1人を消しても意思決定が止まらない。この分散性こそが、同盟のしぶとさの正体だった。 帝国は、同盟艦隊を野戦で打ち破ることはできた。しかし同盟国家を支える地方自治と契約網の結び目を、一撃で断ち切ることはできなかった。だから同盟は生き残った。`],["第5章　自由の強さと弱さ",`同盟は、帝国より善良であろうとした国家である。 議会制度。独立司法。地方自治。代表権。言論の自由。これらはすべて、帝国統治の下で踏みにじられた経験から生まれた。 同盟の建国世代は、本気でそれを信じていた。怒鳴り合い、対立し、徹夜で修正しながらも、妥協の形を探し続けた。国家を力でまとめるのではなく、同意でつなぐ。それが同盟の理念だった。 だが、自由は速くない。議会審議は長い。前線への予算承認は遅れる。軍事行動は世論調査に左右される。補給艦隊の燃料手配すら、複数の委員会承認を必要とする。 この遅さは、ときに人を殺す。それでも同盟の人々は、その不便さを簡単には捨てられない。なぜなら、速さのために権限を集中させれば、結局は帝国と同じものになると知っているからだ。 同盟にとって戦いとは、敵を倒すためだけではない。自分たちの不完全な自由に、それでも価値があると証明するための行為でもある。ここに、同盟が戦い続ける理由がある。`],["第6章　企業連合と傷口の宗教",`同盟の前に立つ敵は、帝国だけではない。 神聖軌道教団は、戦争と崩壊の跡地に必ず現れる。葬儀、診療、配給、孤児保護。国家の手がすぐには届かない場所に、最初に触れるのが教団だった。人々はそこで助けられ、やがて恩義と依存を覚える。 教団は領土を欲しがらない。だが影響力を集める。選挙、世論、地方感情、自治運動。傷ついた共同体の記憶を握った者は、政治そのものを静かに動かせる。 そして企業航路連合。帝国ほど強い中央補給機構を持たない同盟は、物流の相当部分を企業連合へ依存している。食料、燃料、部品、医薬品、修理ドック。商港を押さえた企業が機嫌を損ねれば、同盟の前線は数週間で息切れする。 だが企業連合は、同盟の理想を支持しているわけではない。彼らが重んじるのは利益であり、利益に必要なのは安定ではなく、管理可能な不安定さである。戦争が長引けば儲かる。だが一方の完全勝利は困る。だから彼らは、帝国にも同盟にも必要なだけ物を売り、決定的にはどちらにも肩入れしない。 同盟の側から見ると、これは残酷だった。自由を守るための国家が、その命綱を利益本位の連合体に握られているのだから。しかし現実には、それでも付き合うしかない。同盟は、理想だけでワープ航路を回せるほど豊かではなかった。`],["第7章　なぜ同盟は戦うのか",`同盟は、ただ悪の帝国を倒したいから戦っているのではない。 もちろん帝国への怒りは本物だ。地方を使い捨て、代表権を制限し、善意の顔をしたまま属州を押さえ込んできた体制を許せないという感情は、同盟の建国そのものに刻まれている。 だが、同盟の戦いはそれだけではない。もし帝国を止められなければ、銀河は再び中央の都合で地方を動かす体制へ戻る。議会も自治も代表権も、危機対応の効率という名目で切り縮められる。自由は贅沢品として扱われ、秩序の前に従属させられる。 同盟は、それを恐れている。 だからイアン・セレスは戦う。自由な国家でも勝てることを示すために。マリア・フェルンは制度を守る。非常時だからといって、国家の骨格を壊さないために。ダリル・ボイドは若い将校へ言葉を残そうとする。勝つことと、壊れないことは違うと知っているからだ。 同盟にとって戦争は、独立のための継続戦ではない。自由が弱さではないと証明するための試験である。帝国が銀河統一を自らの使命と考えるなら、同盟は銀河に複数の意思があってよいと示さなければならない。それができなければ、同盟はただの一時的反乱に終わる。 だから同盟は戦う。帝国を倒すために。そして、自由が現実の世界でも成り立つと示すために。`],["第8章　開戦前夜",`地球暦3147年。銀河は再び大きな戦争の縁に立っている。 共和中枢では自由の理念が語られる。だがその言葉の裏で、遅い意思決定が前線を危険にさらしている。 イアン・セレスは守るべき線と捨てるべき線を見極めようとしている。マリア・フェルンは、非常時にどこまで制度を曲げていいのか苦しんでいる。ダリル・ボイドは、若者たちが次の時代に何を持ち越すのか見ようとしている。 帝国は統一のために戦う。同盟は自由のために戦う。どちらも、自分が負ければ人類の未来が狭くなると信じている。だから戦争は避けられない。 ワープ門が銀河をつないだはずだった。だが今、その同じ航路が、帝国と同盟を決定的にぶつけようとしている。 ここが始まりである。銀河が、再び火を噴く前夜である。 速く勝つか。正しく勝つか。勝てなかったとき、何を残すか。それがこの戦記の、すべてだ。`]];
function buildStars(){const root=$('#stars');root.innerHTML='';for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';const z=Math.random()<.18?2:1;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s`;root.appendChild(s)}}

function clamp(n,a,b){return Math.max(a,Math.min(b,n))}

function own(){return G.faction} function foe(){return own()==='emp'?'fed':'emp'} function ownerName(o){return o==='emp'?'帝国':o==='fed'?'同盟':o==='cult'?'教団':o==='corp'?'企業':'中立'} function sectorById(id){return G.sectors.find(s=>s.id===id)} function ownS(){return G.sectors.filter(s=>s.owner===own())}

function fillRoll(el,data,accent){el.innerHTML=data.map(arr=>`<div style="padding:0 0 20px 0"><div style="font-size:22px;letter-spacing:.12em;color:${accent};margin-bottom:16px;font-weight:800;text-shadow:0 0 18px ${accent}66">${arr[0]}</div>${arr[1].split('\n').map(line=>`<div style="font-size:19px;line-height:1.9;color:#ccd8ee;margin-bottom:10px">${line}</div>`).join('')}</div><div style="border-top:1px solid rgba(255,255,255,0.07);margin-bottom:12px"></div>`).join('')}
function newGame(f){G=fresh(f); fillRoll($('#introText'),f==='emp'?INTRO_EMP:INTRO_FED,f==='emp'?'#c8902a':'#4a9fd6'); $('#start').classList.add('hide'); $('#intro').classList.remove('hide'); startRoll(); if(titleBgm)startBgm(); else stopBgm();}
function startRoll(){const wrap=$('#introText');wrap.style.transform='translateY(0)'; cancelAnimationFrame(introAnim); setTimeout(()=>{const total=wrap.scrollHeight+wrap.parentElement.offsetHeight; const dur=360000; let t0=null; function step(ts){if(!t0)t0=ts; if($('#intro').classList.contains('hide'))return; const p=Math.min((ts-t0)/dur,1); wrap.style.transform=`translateY(-${p*total}px)`; if(p<1)introAnim=requestAnimationFrame(step)} introAnim=requestAnimationFrame(step)},100)}
function skipIntro(){cancelAnimationFrame(introAnim); $('#intro').classList.add('hide'); startGameUI(); renderAll();}
function startGameUI(){$('#top').classList.remove('hide');$('#main').classList.remove('hide');$('#nav').classList.remove('hide');$('#bgmBtn').textContent='ボレロ: '+(G.bgm?'ON':'OFF');if(G.bgm)startBgm();else stopBgm()}
function showScreen(name,btn){if(!G)return; G.screen=name; $$('.screen').forEach(x=>x.classList.remove('on')); $('#scr-'+name).classList.add('on'); $$('.nav button').forEach(b=>b.classList.remove('on')); if(btn)btn.classList.add('on')}
function recommendationText(){const my=ownS().length; if(own()==='emp'){if(G.gauge>55)return'停滞度が高い。商港投資か懐柔統治で腐食を止めたい。'; if(my>=6)return'前進できている。占領後の統治方針を誤ると教団に裂かれる。'; return'序盤は回廊と商港。勝つほど管理が重くなる。'} if(G.gauge<45)return'支持率が不安定。無理な侵攻より懐柔と自治を混ぜたい。'; return'制度と保持が強み。中枢を揺らしながら、商港を確保したい。'}
function defenseValue(s){const garrison=G.fleets.filter(f=>f.side===s.owner&&f.loc===s.id).length*8; return s.defenseBase+s.fortLevel*10+garrison+(s.type==='core'?8:0)+(s.specialOwner==='cult'?6:0)+(s.specialOwner==='corp'?4:0)}
function renderMap(){const svg=$('#mapSvg'); let html=''; Object.entries(ADJ).forEach(([a,arr])=>arr.forEach(b=>{if(+a<b){const A=MAP[a],B=MAP[b],hot=(sectorById(+a).owner===own()&&sectorById(b).owner!==own())||(sectorById(b).owner===own()&&sectorById(+a).owner!==own()); html+=`<line class="link ${hot?'hot':''}" x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}"></line>`;}})); MAP.forEach(m=>{const s=sectorById(m.id); const cls=s.owner==='emp'?'emp':s.owner==='fed'?'fed':s.specialOwner==='cult'?'cult':s.specialOwner==='corp'?'corp':'neu'; const extra=[m.type==='core'?'core':'',m.type==='trade'?'trade':'',m.type==='fort'?'fort':''].join(' '); let sub=`${ownerName(s.owner)} 治安${Math.round(s.stab)}`; if(s.specialOwner==='cult')sub='教団支配区'; if(s.specialOwner==='corp')sub='企業管理区'; const icon=m.type==='core'?'✦':m.type==='trade'?'⬡':m.type==='fort'?'⛨':m.type==='haz_blackhole'?'◈':m.type==='haz_asteroid'?'✶':m.type==='gate_hazard'?'⋈':'•'; html+=`<g onclick="openSector(${m.id})"><circle class="sectorCore ${cls} ${extra}" cx="${m.x}" cy="${m.y}" r="${m.type==='core'?20:m.type==='fort'?18:16}"></circle><text class="sectorLabel" x="${m.x}" y="${m.y-3}">${icon} ${m.name}</text><text class="sectorSub" x="${m.x}" y="${m.y+10}">${sub}</text></g>`; if(s.fortLevel>0)html+=`<text x="${m.x+17}" y="${m.y-12}" fill="#ffd56a" font-size="9" text-anchor="middle">要${s.fortLevel}</text>`; }); G.fleets.filter(f=>f.side===own()).forEach((f,i)=>{const m=MAP.find(x=>x.id===f.loc),color=own()==='emp'?'rgba(214,174,83,.95)':'rgba(103,182,239,.95)'; html+=`<circle cx="${m.x-20+i*8}" cy="${m.y-18-i*4}" r="5" fill="${color}" stroke="rgba(255,255,255,.5)"></circle>`;}); svg.innerHTML=html}
function renderWar(){ $('#fleetList').innerHTML=G.fleets.filter(f=>f.side===own()).map(f=>`<div class="item"><div class="row bet"><div><div style="font-weight:800">${f.name}</div><div class="sub">${ROLE_DATA[f.role].name} / 現在地 ${sectorById(f.loc).name}</div></div></div><div class="row wrap" style="gap:5px;margin-top:6px"><span class="tag">HP ${f.hp}</span><span class="tag">士気 ${f.mor}</span><span class="tag">補給 ${f.sup}</span><span class="tag">占領適性 ${ROLE_DATA[f.role].occ}</span></div><div class="row bet" style="margin-top:4px"><span class="smallHelp">戦力維持</span><span class="smallHelp mono">${f.hp}</span></div><div class="bar ok"><span style="width:${f.hp}%"></span></div></div>`).join('')}
function renderDomestic(){ $('#policyMini').innerHTML=`<div class="row bet" style="margin-bottom:8px"><div class="title" style="font-size:14px">政策候補</div><button class="btn sm g" onclick="openPolicies()">選ぶ</button></div><div class="list"><div class="item">制度再編: 正統性と理念を押し上げるが、速度は落ちる。</div><div class="item">補給線再建: 艦隊と回廊を立て直す。</div><div class="item">戦時宣伝: 戦意は伸びるが、理念は削れる。</div></div>`; const cultZones=G.sectors.filter(s=>s.specialOwner==='cult').length,corpZones=G.sectors.filter(s=>s.specialOwner==='corp').length; $('#domDetail').innerHTML=`<div class="item" style="margin-bottom:8px"><div class="row bet"><div class="sub">教団脅威</div><div class="mono">${G.cultThreat}</div></div><div class="bar cult" style="margin-top:5px"><span style="width:${clamp(G.cultThreat,0,100)}%"></span></div><div class="sub" style="margin-top:6px">支配区 ${cultZones}。辺境と不穏に根を張る。</div></div><div class="item"><div class="row bet"><div class="sub">企業脅威</div><div class="mono">${G.corpThreat}</div></div><div class="bar corp" style="margin-top:5px"><span style="width:${clamp(G.corpThreat,0,100)}%"></span></div><div class="sub" style="margin-top:6px">管理区 ${corpZones}。資金を生むが、国家命令を細らせる。</div></div>`}
function renderRec(){ $('#recLog').innerHTML=G.chronicle.slice().reverse().map(x=>`<div class="item">${x}</div>`).join(''); const trade=G.sectors.filter(s=>s.owner===own()&&s.type==='trade').length; const route=trade>=2&&G.credit>65?'経済路線':G.reform>28&&G.ideal>60?'制度路線':G.pressure>55?'覇権路線':'均衡路線'; $('#routeText').textContent='現在の国家路線: '+route+'。'+recommendationText()}
function renderAll(){ if(!G)return; $('#hTitle').textContent=own()==='emp'?'帝国軍統帥本部':'同盟戦略調整局'; $('#hSub').textContent='第'+G.turn+'ターン'; $('#vMoney').textContent=G.money; $('#vWar').textContent=G.war; $('#vLeg').textContent=G.leg; $('#vGauge').textContent=G.gauge; $('#vGaugeLabel').textContent=G.gaugeType; $('#vAP').textContent=G.ap; $('#headline').textContent=G.headline; $('#vOwn').textContent=ownS().length+'/12'; $('#vPressure').textContent=G.pressure; $('#vReform').textContent=G.reform; $('#vDanger').textContent=G.danger; $('#vPower').textContent=G.power; $('#vCredit').textContent=G.credit; $('#vCultThreat').textContent=G.cultThreat; $('#vCorpThreat').textContent=G.corpThreat; $('#advice').textContent=recommendationText(); $('#recentChoices').innerHTML=(G.recentChoices.length?G.recentChoices:['まだ選択なし']).map(x=>`<span class="choiceChip">${x}</span>`).join(''); $('#saveMark').textContent='未保存'; renderMap(); renderWar(); renderDomestic(); renderRec(); showScreen(G.screen||'home'); }
function spendAP(n=1){if(G.ap<n){toast('行動点不足');return false} G.ap-=n; return true}
function openSector(id){const s=sectorById(id); const canAttack=G.ap>=2&&G.fleets.some(f=>f.side===own()&&ADJ[f.loc].includes(id))&&s.owner!==own()&&s.specialOwner==null; const canInvest=G.money>=4&&(s.owner===own()||s.owner==='neu'); const canPacify=G.ap>=1&&s.owner===own(); const canFortify=G.ap>=1&&(s.owner===own()||s.owner==='neu'); $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">${s.name}</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="heroMini ${s.owner==='emp'?'emp':s.owner==='fed'?'fed':s.specialOwner==='cult'?'cult':'corp'}"><div class="heroMiniInner"><div class="heroMiniTitle">${typeName(s.type)} / ${ownerName(s.owner)}</div><div class="heroMiniText">現在防衛値 ${defenseValue(s)}。基礎 ${s.defenseBase}、要塞化 ${s.fortLevel*10}、占領抵抗 ${s.occupyResist+s.fortLevel*12}。</div></div></div><div class="item" style="margin-top:8px"><div class="row wrap" style="gap:5px"><span class="tag">治安 ${Math.round(s.stab)}</span><span class="tag">補給 ${Math.round(s.supply)}</span><span class="tag">戦力 ${s.fleet}</span><span class="tag">要塞化Lv ${s.fortLevel}</span>${s.policy?`<span class="tag warn">統治 ${s.policy}</span>`:''}</div><div class="sub" style="margin-top:6px">要塞化1段階ごとに 防衛値+10、占領抵抗+12、迎撃補正+10 です。</div></div><div class="g2" style="margin-top:8px"><button class="btn" ${canInvest?'':'disabled'} onclick="investSector(${id})">投資</button><button class="btn g" ${canPacify?'':'disabled'} onclick="pacifySector(${id})">宣撫</button></div><div class="g2" style="margin-top:7px"><button class="btn g" ${canFortify?'':'disabled'} onclick="fortifySector(${id})">要塞化</button><button class="btn" ${canAttack?'':'disabled'} onclick="attackSector(${id})">進軍</button></div>`; $('#modal').classList.add('on')}
function typeName(t){return({core:'中枢',lane:'回廊',ind:'工業',trade:'商港',fort:'要塞',rim:'辺境',gate_hazard:'星門',haz_blackhole:'黒門',haz_asteroid:'乱礫域'})[t]||'宙域'}
function closeModal(){$('#modal').classList.remove('on')}
function investSector(id){const s=sectorById(id); if(G.money<4){toast('資金不足');return} G.money-=4; s.stab=clamp(s.stab+14,0,100); s.supply=clamp(s.supply+10,0,100); s.unrest=Math.max(0,s.unrest-8); if(s.type==='trade'){G.credit+=2; G.money+=1; s.corp+=8;} if(s.type==='ind'){G.power+=2; if(own()==='emp')G.gauge+=2; else G.gauge-=2;} if(s.type==='rim'){s.unrest=Math.max(0,s.unrest-6); s.stab+=4;} G.headline=s.name+'への投資を実施。便利だが偏る。'; recent('投資:'+s.name); closeModal(); renderAll()}
function pacifySector(id){const s=sectorById(id); if(!spendAP())return; if(G.money<2){G.ap++; toast('資金不足'); return} G.money-=2; s.unrest=Math.max(0,s.unrest-18); s.cult=Math.max(0,s.cult-10); s.stab=clamp(s.stab+8,0,100); G.leg+=2; G.headline=s.name+'で宣撫を実施。不穏を抑えた。'; recent('宣撫:'+s.name); closeModal(); renderAll()}
function fortifySector(id){const s=sectorById(id); if(!spendAP())return; if(G.money<4){G.ap++; toast('資金不足'); return} G.money-=4; s.fortLevel=clamp(s.fortLevel+1,0,3); s.fleet+=1; s.stab=clamp(s.stab+4,0,100); G.credit-=1; G.headline=s.name+'の防衛線を増築した。'; recent('要塞化:'+s.name); closeModal(); renderAll()}
function openPolicies(){ $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">政策</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="list"><div class="item"><div style="font-weight:800">制度再編</div><div class="sub" style="margin-top:4px">正統性+4 理念+5 再編+4 戦意-2</div><button class="btn sm" style="margin-top:8px" onclick="applyPolicy('reform')">実行</button></div><div class="item"><div style="font-weight:800">補給線再建</div><div class="sub" style="margin-top:4px">資金-2 自軍艦隊HP+10 士気+12 補給+16</div><button class="btn sm" style="margin-top:8px" onclick="applyPolicy('supply')">実行</button></div><div class="item"><div style="font-weight:800">戦時宣伝</div><div class="sub" style="margin-top:4px">戦意+8 圧力+2 理念-3 信用-2</div><button class="btn sm" style="margin-top:8px" onclick="applyPolicy('prop')">実行</button></div></div>`; $('#modal').classList.add('on')}
function applyPolicy(id){if(!spendAP())return; if(id==='reform'){G.leg+=4;G.ideal+=5;G.reform+=4;G.war-=2}else if(id==='supply'){if(G.money<2){G.ap++;toast('資金不足');return} G.money-=2; G.fleets.filter(f=>f.side===own()).forEach(f=>{f.hp=clamp(f.hp+10,0,100);f.mor=clamp(f.mor+12,0,80);f.sup=clamp(f.sup+16,0,80)})}else if(id==='prop'){G.war+=8;G.pressure+=2;G.ideal-=3;G.credit-=2} G.headline='政策を更新した。国家の形が少し傾いた。'; recent('政策:'+id); closeModal(); renderAll()}
function openIntel(){ $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">諜報</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="list">${G.sectors.filter(s=>s.owner===foe()).map(s=>`<div class="item"><div class="row bet"><div><div style="font-weight:800">${s.name}</div><div class="sub">治安 ${s.stab} / 補給 ${s.supply}</div></div><button class="btn sm" onclick="intelStrike(${s.id})">工作</button></div></div>`).join('')}</div>`; $('#modal').classList.add('on')}
function intelStrike(id){if(!spendAP())return; if(G.money<2){G.ap++;toast('資金不足');return} const s=sectorById(id); G.money-=2; s.unrest=clamp(s.unrest+22,0,100); s.stab=clamp(s.stab-12,0,100); s.supply=clamp(s.supply-15,0,100); s.cult=clamp(s.cult+8,0,100); G.headline=s.name+'へ諜報工作を実施。'; recent('諜報:'+s.name); closeModal(); renderAll()}
function attackSector(id){const fleets=G.fleets.filter(f=>f.side===own()&&ADJ[f.loc].includes(id)); $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">進軍艦隊の選択</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="list">${fleets.map(f=>`<div class="item"><div class="row bet"><div><div style="font-weight:800">${f.name}</div><div class="sub">${ROLE_DATA[f.role].name} / 現在地 ${sectorById(f.loc).name}</div></div><button class="btn sm" onclick="prepareBattle('${f.id}',${id})">進軍</button></div></div>`).join('')}</div>`; $('#modal').classList.add('on')}
function prepareBattle(fid,target){if(!spendAP(2))return; const f=G.fleets.find(x=>x.id===fid),s=sectorById(target), defenders=G.fleets.filter(x=>x.side===foe()&&x.loc===target), guard=defenseValue(s)+defenders.length*12; G.battle={fleetId:fid,target,round:1,max:3,myHP:f.hp,myMor:f.mor,mySup:f.sup,enHP:clamp(50+s.fleet*6+defenders.length*10,30,100),enMor:75,enSup:72,guard,cmd:null,log:[`${s.name} へ進軍。会戦勝利と占領成功は別判定。`],result:null}; closeModal(); renderBattle()}
function renderBattle(){const b=G.battle, f=G.fleets.find(x=>x.id===b.fleetId), s=sectorById(b.target); $('#battleBody').innerHTML=`<div class="row bet" style="margin-bottom:8px"><div class="title" style="font-size:16px">${s.name} 会戦 R${b.round}/${b.max}</div><button class="btn sm g" onclick="abortBattle()">戻る</button></div><div class="heroMini ${own()==='emp'?'emp':'fed'}"><div class="heroMiniInner"><div class="heroMiniTitle">${f.name}</div><div class="heroMiniText">${ROLE_DATA[f.role].name}。突破、迎撃、攪乱から選ぶ。</div></div></div><div class="item" style="margin-top:8px"><div class="row bet"><span>自軍 HP</span><span>${b.myHP}</span></div><div class="bar ok"><span style="width:${b.myHP}%"></span></div><div class="row bet" style="margin-top:4px"><span>敵 HP</span><span>${b.enHP}</span></div><div class="bar bad"><span style="width:${b.enHP}%"></span></div><div class="row bet" style="margin-top:4px"><span>自軍補給</span><span>${b.mySup}</span></div><div class="bar warn"><span style="width:${b.mySup}%"></span></div></div><div class="g3" style="margin-top:8px"><button class="btn ${b.cmd==='breakthrough'?'':'g'}" onclick="pickCmd('breakthrough')">突破</button><button class="btn ${b.cmd==='defense'?'':'g'}" onclick="pickCmd('defense')">迎撃</button><button class="btn ${b.cmd==='disrupt'?'':'g'}" onclick="pickCmd('disrupt')">攪乱</button></div><div class="g2" style="margin-top:8px"><button class="btn" onclick="battleStep()">ラウンド実行</button><button class="btn g" onclick="autoBattle()">一気に決着</button></div><div class="item" style="margin-top:8px">${b.log.slice(-3).join('<br>')}</div>`; $('#battle').classList.add('on')}
function pickCmd(c){G.battle.cmd=c; renderBattle()}
function enemyCmd(){return ['breakthrough','defense','disrupt'][Math.floor(Math.random()*3)]}
function cmdAdv(my,en){if(my===en)return 0; if((my==='breakthrough'&&en==='defense')||(my==='defense'&&en==='disrupt')||(my==='disrupt'&&en==='breakthrough'))return 1; return -1}
function battleStep(){const b=G.battle; if(!b.cmd){toast('命令を選択してください');return} const f=G.fleets.find(x=>x.id===b.fleetId), myRole=ROLE_DATA[f.role], e=enemyCmd(), adv=cmdAdv(b.cmd,e); let myAtk=18+myRole.atk+(b.cmd==='breakthrough'?12:b.cmd==='disrupt'?6:-2)+(adv>0?10:adv<0?-6:0)+Math.floor(Math.random()*8); let enAtk=16+(e==='breakthrough'?10:e==='disrupt'?5:-1)+(adv<0?10:adv>0?-4:0)+Math.floor(Math.random()*8); if(b.cmd==='defense')enAtk-=8; if(b.cmd==='disrupt'){b.enSup=clamp(b.enSup-12,0,100); enAtk-=4;} if(b.mySup<45)myAtk-=6; if(b.enSup<45)enAtk-=6; b.enHP=clamp(b.enHP-Math.max(2,Math.round(myAtk*0.8)),0,100); b.myHP=clamp(b.myHP-Math.max(1,Math.round(enAtk*0.7)),0,100); b.myMor=clamp(b.myMor-(b.cmd==='breakthrough'?8:4),0,80); b.mySup=clamp(b.mySup-(b.cmd==='breakthrough'?10:b.cmd==='disrupt'?8:5),0,80); b.log.push(`自軍 ${cmdName(b.cmd)} / 敵 ${cmdName(e)}。敵損耗 ${Math.max(2,Math.round(myAtk*0.8))}、自損耗 ${Math.max(1,Math.round(enAtk*0.7))}。`); b.round++; b.cmd=null; if(b.round>b.max||b.enHP<=0||b.myHP<=0)finishBattle(); else renderBattle()}
function cmdName(c){return c==='breakthrough'?'突破':c==='defense'?'迎撃':'攪乱'} function autoBattle(){while(G.battle&&G.battle.round<=G.battle.max&&G.battle.enHP>0&&G.battle.myHP>0){if(!G.battle.cmd)G.battle.cmd='breakthrough'; battleStep()}}
function finishBattle(){const b=G.battle, f=G.fleets.find(x=>x.id===b.fleetId), s=sectorById(b.target); f.hp=b.myHP; f.mor=b.myMor; f.sup=b.mySup; const win=b.enHP<b.myHP; const margin=b.myHP-b.enHP; const resultType=!win?'敗走':margin>28?'壊走':'勝利'; const reasons=[]; const occupyPressure=Math.round(b.myHP*0.25+b.mySup*0.35+ROLE_DATA[f.role].occ+(ADJ[s.id].filter(id=>sectorById(id).owner===own()).length*6)+Math.max(0,50-s.stab)*0.2); const occupyNeed=s.occupyResist+s.fortLevel*12+(s.type==='core'?18:0)+(s.type==='fort'?14:0);
 if(!win)reasons.push('会戦そのものに敗れた'); else { if(b.mySup<45)reasons.push('補給不足で駐留部隊を維持できない'); if(G.fleets.some(x=>x.side===foe()&&x.loc===s.id))reasons.push('敵残存艦隊が後方に残っている'); if(occupyPressure<occupyNeed)reasons.push('占領兵力が不足している'); if((s.type==='core'||s.type==='fort')&&ADJ[s.id].filter(id=>sectorById(id).owner===own()).length<1)reasons.push('周辺支配線が薄く統治が続かない'); }
 const occupy=win&&reasons.length===0; if(occupy){s.owner=own(); s.stab=clamp(s.stab-18,0,100); s.unrest=clamp(s.unrest+12,0,100); f.loc=s.id; openOccupationPolicy(s.id,resultType,reasons); return;} if(win){G.pressure+=6; G.war+=4; G.leg+=1; G.headline=s.name+'で会戦に勝利したが、占領には届かなかった。'; recent('勝利:'+s.name);} else {G.war-=4; G.leg-=3; G.headline=s.name+'で敗れた。前線が押し返された。'; recent('敗北:'+s.name);} $('#battleBody').innerHTML=`<div class="title" style="font-size:18px;color:${win?'var(--ok)':'var(--bad)'}">${resultType}</div><div class="item" style="margin-top:8px">会戦結果: ${win?'勝利':'敗北'}</div><div class="item" style="margin-top:8px">占領結果: ${occupy?'成功':'失敗'}<br>${reasons.join('<br>')||'制圧完了'}</div><div class="g2" style="margin-top:8px"><button class="btn" onclick="closeBattle()">閉じる</button><button class="btn g" onclick="closeBattle()">記録へ</button></div>`}
function openOccupationPolicy(id,resultType,reasons){const s=sectorById(id); $('#battleBody').innerHTML=`<div class="title" style="font-size:18px;color:var(--ok)">制圧完了</div><div class="item" style="margin-top:8px">会戦結果: ${resultType}<br>占領後の統治方針を選んでください。</div><div class="list" style="margin-top:8px"><div class="item"><div style="font-weight:800">軍政</div><div class="sub" style="margin-top:4px">即戦力化。圧力+8 資金+3 不穏+18 教団+8</div><button class="btn sm" style="margin-top:8px" onclick="applyOccupationPolicy(${id},'軍政')">選択</button></div><div class="item"><div style="font-weight:800">懐柔</div><div class="sub" style="margin-top:4px">保持重視。治安+10 不穏-10 正統性+3</div><button class="btn sm" style="margin-top:8px" onclick="applyOccupationPolicy(${id},'懐柔')">選択</button></div><div class="item"><div style="font-weight:800">企業委託</div><div class="sub" style="margin-top:4px">資金+6 補給+10 企業+18 信用-2</div><button class="btn sm" style="margin-top:8px" onclick="applyOccupationPolicy(${id},'企業委託')">選択</button></div><div class="item"><div style="font-weight:800">自治容認</div><div class="sub" style="margin-top:4px">理念+4 支持率または停滞改善 不穏-4 圧力は伸びにくい</div><button class="btn sm" style="margin-top:8px" onclick="applyOccupationPolicy(${id},'自治容認')">選択</button></div></div>`; $('#battle').classList.add('on')}
function applyOccupationPolicy(id,p){const s=sectorById(id); s.policy=p; if(p==='軍政'){G.pressure+=8; G.money+=3; s.unrest=clamp(s.unrest+18,0,100); s.cult=clamp(s.cult+8,0,100)} else if(p==='懐柔'){s.stab=clamp(s.stab+10,0,100); s.unrest=clamp(s.unrest-10,0,100); G.leg+=3} else if(p==='企業委託'){G.money+=6; s.supply=clamp(s.supply+10,0,100); s.corp=clamp(s.corp+18,0,100); G.credit-=2} else if(p==='自治容認'){G.ideal+=4; if(own()==='emp')G.gauge=Math.max(0,G.gauge-3); else G.gauge+=4; s.unrest=clamp(s.unrest-4,0,100)} G.headline=s.name+'の統治方針を '+p+' に定めた。'; recent('統治:'+s.name+' '+p); closeBattle(); renderAll()}
function abortBattle(){$('#battle').classList.remove('on'); G.battle=null; G.ap+=2; renderAll()}
function closeBattle(){$('#battle').classList.remove('on'); G.battle=null; renderAll()}
function openWeapon(){ $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">巨大兵器</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="item">段階: ${weaponStageName()}<br>建造支持度 ${G.weaponSupport} / 反発蓄積 ${G.weaponBacklash}</div><div class="g2" style="margin-top:8px"><button class="btn" ${(G.weaponStage===0||G.weaponStage===1)?'':'disabled'} onclick="advanceWeapon()">進める</button><button class="btn warn" ${(G.weaponStage===3)?'':'disabled'} onclick="selectWeaponTarget()">目標設定</button></div><div class="sub" style="margin-top:8px">劣勢時の建造は逆転の希望になりますが、優勢時の建造は国内反発を招きます。</div>`; $('#modal').classList.add('on')}
function weaponStageName(){return ['未着手','設計中','建造中','完成'][G.weaponStage]||'完成'}
function advanceWeapon(){if(!spendAP())return; if(G.weaponStage===0){if(G.reform<12){G.ap++;toast('制度再編が足りません');return} G.weaponStage=1; recent('兵器設計');} else if(G.weaponStage===1){if(G.money<10){G.ap++;toast('資金不足');return} G.money-=10; G.weaponStage=2; G.weaponBuild=2; const leading=ownS().length>=7||G.pressure>=55; if(leading){G.weaponBacklash+=18; G.leg-=4; G.credit-=3; G.headline='巨大兵器建造に対する反発が広がっている。'} else {G.weaponSupport+=8; G.headline='巨大兵器は最後の切り札として支持された。'} recent('兵器建造');} closeModal(); renderAll()}
function selectWeaponTarget(){ $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">照準</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="list">${G.sectors.filter(s=>s.owner===foe()).map(s=>`<div class="item"><div class="row bet"><div><div style="font-weight:800">${s.name}</div><div class="sub">治安 ${s.stab} / 戦力 ${s.fleet}</div></div><button class="btn sm warn" onclick="fireWeapon(${s.id})">発射</button></div></div>`).join('')}</div>`}
function fireWeapon(id){const s=sectorById(id); s.fleet=Math.max(0,s.fleet-3); s.stab=clamp(s.stab-28,0,100); s.supply=clamp(s.supply-25,0,100); s.fortLevel=Math.max(0,s.fortLevel-1); G.leg-=15; G.credit-=8; G.ideal-=10; G.cultThreat+=10; G.corpThreat+=8; G.weaponStage=4; G.headline=s.name+'へ巨大兵器を投入した。銀河はそれを忘れない。'; recent('巨大兵器:'+s.name); closeModal(); renderAll()}
function nextTurn(){if(G.ended)return; G.turn++; G.ap=3; passive(); enemyTurn(); thirdEvents(); if(G.weaponStage===2){G.weaponBuild--; if(G.weaponBuild<=0)G.weaponStage=3} checkEnd(); renderAll()}
function passive(){ if(own()==='emp'){G.gauge+=2; if(G.gauge>55){G.credit-=1; G.ideal-=1}} else {G.gauge-=1; if(G.gauge<45){G.credit-=1; G.leg-=1}} G.money+=ownS().filter(s=>s.type==='trade').length*2; G.war-=1; ownS().forEach(s=>{if(s.policy==='軍政')s.unrest=clamp(s.unrest+4,0,100); if(s.policy==='懐柔')s.stab=clamp(s.stab+3,0,100); if(s.policy==='企業委託')s.corp=clamp(s.corp+5,0,100); if(s.policy==='自治容認')s.unrest=clamp(s.unrest-2,0,100)}); G.fleets.filter(f=>f.side===own()).forEach(f=>{f.mor=clamp(f.mor+3,0,80); f.sup=clamp(f.sup+4,0,80); if(sectorById(f.loc).type==='ind')f.hp=clamp(f.hp+6,0,100); else f.hp=clamp(f.hp+3,0,100)}); G.headline='戦況が一段進んだ。'+recommendationText()}
function enemyTurn(){const enemies=G.fleets.filter(f=>f.side===foe()); const targets=G.sectors.filter(s=>s.owner!==foe()&&s.specialOwner==null); const target=targets.sort((a,b)=>enemyScore(b)-enemyScore(a))[0]; if(target&&Math.random()<0.68){ target.stab=clamp(target.stab-8,0,100); if(target.owner===own()&&target.type!=='core'&&target.stab<38&&defenseValue(target)<58){target.owner=foe(); target.unrest=clamp(target.unrest+12,0,100); G.leg-=3; G.war-=2; G.chronicle.push(`第${G.turn}ターン ${ownerName(foe())}が ${target.name} を奪取した。`); } else {G.chronicle.push(`第${G.turn}ターン ${ownerName(foe())}が ${target.name} を攻撃し、前線を削った。`);} } else {G.chronicle.push(`第${G.turn}ターン ${ownerName(foe())}は補給と再編を優先した。`);} enemies.forEach(f=>{f.hp=clamp(f.hp+4,0,100);f.mor=clamp(f.mor+4,0,80);f.sup=clamp(f.sup+5,0,80)})}
function enemyScore(s){let v=0; if(s.owner===own())v+=12; if(s.type==='trade')v+=10; if(s.type==='lane')v+=11; if(s.type==='core')v+=9; if(s.unrest>40)v+=8; if(s.stab<50)v+=8; return v}
function thirdEvents(){G.sectors.forEach(s=>{if(s.type==='rim'||s.type==='haz_blackhole'||s.type==='haz_asteroid')s.cult=clamp(s.cult+2,0,100); if(s.type==='trade')s.corp=clamp(s.corp+3,0,100); if(s.unrest>=55&&s.cult>=60&&s.owner===own()&&Math.random()<0.22){s.specialOwner='cult'; s.specialLevel=60; G.cultThreat+=8; G.leg-=3; G.chronicle.push(`第${G.turn}ターン ${s.name} が教団支配区へ傾いた。`);} if(s.corp>=65&&(s.type==='trade'||s.type==='lane'||s.type==='ind')&&Math.random()<0.18){s.specialOwner='corp'; s.specialLevel=65; G.corpThreat+=8; G.credit-=2; G.chronicle.push(`第${G.turn}ターン ${s.name} が企業管理区化した。`);} if(s.specialOwner==='cult'){ADJ[s.id].forEach(id=>sectorById(id).cult=clamp(sectorById(id).cult+8,0,100))} if(s.specialOwner==='corp'){G.money+=1; s.corp=clamp(s.corp+4,0,100)}}); G.danger=clamp(Math.max(0,40-G.leg)+Math.max(0,38-G.credit)+Math.max(0,28-G.war)+G.cultThreat/3+G.corpThreat/3,0,100)}
function checkEnd(){if(G.leg<20||G.war<10||ownS().length<=2||G.cultThreat>=95||G.corpThreat>=95){G.ended=true; $('#modalBody').innerHTML=`<div class="title" style="font-size:18px;color:var(--bad)">終幕</div><div class="item" style="margin-top:8px">国家は戦場の外側から崩れた。</div><div class="g2" style="margin-top:8px"><button class="btn" onclick="saveGame()">記録</button><button class="btn g" onclick="location.reload()">タイトルへ</button></div>`; $('#modal').classList.add('on');} else if(ownS().length>=8&&G.pressure>=60){G.ended=true; $('#modalBody').innerHTML=`<div class="title" style="font-size:18px;color:var(--ok)">覇権勝利</div><div class="item" style="margin-top:8px">銀河図の形を変えた。だが、広がった支配は次の統治という重みを要求する。</div><div class="g2" style="margin-top:8px"><button class="btn" onclick="saveGame()">記録</button><button class="btn g" onclick="location.reload()">タイトルへ</button></div>`; $('#modal').classList.add('on');}}
function recent(t){G.recentChoices.unshift(t); G.recentChoices=G.recentChoices.slice(0,6); G.chronicle.push(`第${G.turn}ターン ${t}`)}
function openHelp(){ $('#modalBody').innerHTML=`<div class="row bet" style="margin-bottom:12px"><div class="title" style="font-size:15px">実装方針</div><button class="btn sm g" onclick="closeModal()">閉じる</button></div><div class="item">会戦は3コマンド制です。勝利と占領は別判定で、占領失敗理由を表示します。占領後は軍政、懐柔、企業委託、自治容認を選びます。要塞化は防衛値と占領抵抗を可視化しました。教団支配区と企業管理区を実装しています。</div>`; $('#modal').classList.add('on')}
function toggleBgm(){G.bgm=!G.bgm; $('#bgmBtn').textContent='ボレロ: '+(G.bgm?'ON':'OFF'); if(G.bgm)startBgm(); else stopBgm()}
function startBgm(){if(bgmOn)return; bgmOn=true; clearInterval(bgmLoop); const notes=[261.6,293.7,311.1,349.2,392.0,415.3,466.2,523.3]; const Audio=window.AudioContext||window.webkitAudioContext; if(!Audio)return; if(!window._bgmCtx)window._bgmCtx=new Audio(); const ctx=window._bgmCtx; let i=0; bgmLoop=setInterval(()=>{if(!bgmOn)return; const o=ctx.createOscillator(),g=ctx.createGain(); o.type=i%8<4?'sine':'triangle'; o.frequency.value=notes[i%notes.length]; g.gain.value=.0001; g.gain.exponentialRampToValueAtTime(.025,ctx.currentTime+.02); g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.28); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+.3); i++;},315)}
function stopBgm(){bgmOn=false; clearInterval(bgmLoop)}
window.onload=()=>{buildStars(); setTitleBgm(localStorage.getItem('astral_title_bgm')!=='0')}
</script>
