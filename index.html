<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>星暦戦記 アストラル・クラウン 最終試作</title>
<style>
:root{
  --bg:#07101e;--bg2:#0b1730;--panel:rgba(9,18,36,.78);--panel2:rgba(14,24,45,.9);
  --line:#2d477d;--text:#edf3ff;--sub:#9eb6e6;--muted:#6c81af;
  --emp:#d5ac54;--fed:#69b7ef;--cult:#b879ff;--corp:#6fdec8;
  --danger:#ff6e74;--warn:#f4b15f;--ok:#61d38f;
  --safeT:env(safe-area-inset-top);--safeB:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:#040915;color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;overflow:hidden}
button{font:inherit}
body{display:flex;justify-content:center}
#app{position:relative;width:100%;max-width:460px;height:100dvh;overflow:hidden;background:
 radial-gradient(circle at 20% 8%,rgba(213,172,84,.10),transparent 24%),
 radial-gradient(circle at 84% 10%,rgba(105,183,239,.10),transparent 24%),
 radial-gradient(circle at 55% 90%,rgba(184,121,255,.09),transparent 26%),
 linear-gradient(180deg,#06101d 0%,#09152a 48%,#060d18 100%)}
#stars{position:absolute;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw 3.8s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.92;transform:scale(1.35)}}
.top{position:absolute;left:0;right:0;top:0;z-index:30;padding:calc(8px + var(--safeT)) 10px 8px;background:rgba(4,10,20,.86);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.main{position:absolute;left:0;right:0;top:136px;bottom:0;overflow:auto;padding:0 0 212px;z-index:10}
.topLine{display:flex;justify-content:space-between;align-items:center;gap:8px}
.title{font-size:20px;font-weight:900}
.small{font-size:12px;color:var(--sub)}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.07);font-size:11px;color:var(--sub);border:1px solid rgba(255,255,255,.08)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}
.kpi{padding:8px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);text-align:center}
.kpi b{display:block;font-size:13px}.kpi span{font-size:11px;color:var(--sub)}
.hints{display:flex;gap:8px;overflow:auto;padding-top:8px;scrollbar-width:none}.hints::-webkit-scrollbar{display:none}
.hint{min-width:172px;padding:8px 10px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.09)}
.hint .h{font-size:12px;font-weight:800}.hint .s{font-size:11px;color:var(--sub);margin-top:2px}
.mapCard{position:relative;margin:10px;border-radius:22px;border:1px solid rgba(255,255,255,.08);overflow:hidden;background:rgba(255,255,255,.04)}
.mapHeader{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.12)}
.mapHeader .sub{font-size:12px;color:var(--sub)}
svg{display:block;width:100%;height:auto}
.line{stroke:#7fa3ff;stroke-width:4.4;stroke-linecap:round;opacity:.72}
.line.minor{stroke-width:3.0;opacity:.48}
.regionGlow{filter:blur(28px);opacity:.8}
.node text{font-weight:900;paint-order:stroke;stroke:#06101d;stroke-width:4px}
.node circle.core{stroke:rgba(255,255,255,.9);stroke-width:2.5}
.node circle.ring{fill:none;stroke-width:2.2;stroke-dasharray:6 6;animation:ring 1.3s linear infinite}
@keyframes ring{to{stroke-dashoffset:-24}}
.node circle.pulse{transform-origin:center;animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.24);opacity:.92}}
.logCard{margin:10px;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:10px}
.logItem{padding:8px 10px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-top:8px;font-size:13px}
.floatSheet{position:absolute;left:10px;right:10px;bottom:calc(10px + var(--safeB));z-index:40;border-radius:24px 24px 18px 18px;background:rgba(10,18,35,.86);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.10);box-shadow:0 16px 40px rgba(0,0,0,.35);overflow:hidden}
.handle{display:flex;justify-content:center;padding:9px 0 6px;cursor:pointer;background:rgba(255,255,255,.03)}
.handleBar{width:54px;height:6px;border-radius:999px;background:rgba(255,255,255,.20)}
.sheetBody{padding:10px 12px 12px;display:grid;gap:10px}
.miniStatus{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.miniTitle{font-size:17px;font-weight:900}.miniSub{font-size:11px;color:var(--sub);margin-top:3px}
.ownerTag{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid rgba(255,255,255,.14)}
.bars{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.barWrap{display:grid;gap:4px}.barHead{display:flex;justify-content:space-between;font-size:11px;color:var(--sub)}
.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar span{display:block;height:100%}
.layers{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.layers button,.actions button,.sideBtns button,.battleBtns button,.startBtns button,.modal button{border:none;border-radius:16px;padding:10px 8px;background:rgba(255,255,255,.06);color:var(--text);font-weight:800}
.layers button.on,.actions button.on{background:#ecf3ff;color:#0b1120}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.actions button{min-height:66px;display:grid;align-content:center;gap:3px;font-size:13px}
.actions button .cap{font-size:10px;color:var(--sub);font-weight:600}
.sideBtns{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.hidden{display:none!important}
.overlay{position:absolute;inset:0;z-index:60;background:rgba(3,8,18,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:14px}
.modal{width:100%;max-width:430px;border-radius:24px;background:rgba(10,18,35,.96);border:1px solid rgba(255,255,255,.12);padding:14px;display:grid;gap:10px}
.big{font-size:22px;font-weight:900}.sub{color:var(--sub)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.list{display:grid;gap:8px}
.start{position:absolute;inset:0;z-index:70;padding:16px;display:grid;align-content:center;gap:12px;background:rgba(2,5,12,.66);backdrop-filter:blur(8px)}
.card{padding:14px;border-radius:22px;border:1px solid rgba(255,255,255,.1);background:rgba(9,16,31,.88)}
.startBtns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.emp{color:var(--emp)} .fed{color:var(--fed)} .cult{color:var(--cult)} .corp{color:var(--corp)}
</style>
</head>
<body>
<div id="app">
  <div id="stars"></div>
  <div id="start" class="start">
    <div class="card">
      <div class="big">星暦戦記<br><span class="emp">アストラル・クラウン</span></div>
      <div class="sub" style="margin-top:8px">20宙域、4陣営、艦隊戦と占領戦の二段階、第三勢力の歪み、危険政策、固有クライシスを備えた縦画面戦略試作です。</div>
      <div class="startBtns" id="startBtns"></div>
    </div>
  </div>
  <div id="hud" class="top hidden"></div>
  <div id="main" class="main hidden"></div>
  <div id="sheet" class="floatSheet hidden"></div>
  <div id="overlay" class="hidden"></div>
</div>
<script>
const $=s=>document.querySelector(s);
const F={emp:{id:'emp',name:'帝国',short:'帝',color:'var(--emp)',fleet:true,desc:'広げて勝つ。しかし広げすぎると内部から腐る。',diff:'★★★'},fed:{id:'fed',name:'共和連邦',short:'連',color:'var(--fed)',fleet:true,desc:'守るだけでは痩せる。動き続けて民意を保て。',diff:'★★☆'},cult:{id:'cult',name:'太陽教団',short:'教',color:'var(--cult)',fleet:false,desc:'戦わずに浸透し、後方を爆発させろ。',diff:'★★★★'},corp:{id:'corp',name:'通商租界',short:'商',color:'var(--corp)',fleet:false,desc:'契約を売り、世界の選択肢そのものを歪めろ。',diff:'★★★★'}};
const ADJ={1:[2,5],2:[1,3,6],3:[2,4,7],4:[3,8],5:[1,6,9],6:[2,5,7,10],7:[3,6,8,11],8:[4,7,12],9:[5,10,13],10:[6,9,11,14],11:[7,10,12,15],12:[8,11,16],13:[9,14,17],14:[10,13,15,18],15:[11,14,16,19],16:[12,15,20],17:[13,18],18:[14,17,19],19:[15,18,20],20:[16,19]};
const ROLE={main:{name:'主攻',dmg:1.12,taken:1.10,init:0},support:{name:'支援突入',dmg:.95,taken:.88,init:.04},feint:{name:'陽動突撃',dmg:.94,taken:.96,init:.15}};
const TACTICS_F=['砲撃','突撃','攪乱'], TACTICS_O=['制圧','強襲','浸透'];
const SRAW=[
{id:1,n:'皇帝星域',o:'emp',x:160,y:90,t:['本拠']},{id:2,n:'王冠星港',o:'emp',x:300,y:150,t:['回廊門','商港']},{id:3,n:'帝国工業圏',o:'emp',x:205,y:250,t:['工業']},{id:4,n:'貴族領星域',o:'emp',x:330,y:350,t:['内圏']},
{id:5,n:'内環星域',o:'emp',x:520,y:85,t:['回廊']},{id:6,n:'辺境防衛圏',o:'emp',x:470,y:190,t:['要塞']},{id:7,n:'要塞惑星圏',o:'emp',x:600,y:275,t:['要塞','焦点']},{id:8,n:'蒼穹回廊',o:'corp',x:500,y:375,t:['回廊門','焦点']},
{id:9,n:'自由商港',o:'corp',x:840,y:90,t:['商港','焦点']},{id:10,n:'契約中枢',o:'corp',x:720,y:180,t:['租界','焦点']},{id:11,n:'太陽聖域',o:'cult',x:870,y:270,t:['聖域','焦点']},{id:12,n:'巡礼回廊',o:'cult',x:740,y:360,t:['教線']},
{id:13,n:'北方穀倉',o:'fed',x:160,y:580,t:['農政']},{id:14,n:'市民防衛線',o:'fed',x:300,y:665,t:['防衛']},{id:15,n:'共和造兵圏',o:'fed',x:210,y:785,t:['工業']},{id:16,n:'共和中枢',o:'fed',x:330,y:920,t:['本拠','焦点']},
{id:17,n:'白銀関門',o:'fed',x:840,y:565,t:['回廊門','焦点']},{id:18,n:'通商緩衝帯',o:'corp',x:730,y:690,t:['中継','焦点']},{id:19,n:'双星要塞',o:'fed',x:860,y:805,t:['要塞','焦点']},{id:20,n:'南方辺境',o:'fed',x:740,y:935,t:['辺境']}
];
const G={};
const own=()=>G.player, clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const sector=id=>G.sectors.find(s=>s.id===id), nation=id=>G.nations[id];
const ownedBy=id=>G.sectors.filter(s=>s.owner===id);
const fleetsAt=id=>G.fleets.filter(f=>f.loc===id&&f.absent===0), myFleetsAt=id=>fleetsAt(id).filter(f=>f.side===own()), enemyFleetsAt=id=>fleetsAt(id).filter(f=>f.side!==own());
function mkStars(){const root=$('#stars'); root.innerHTML=''; for(let i=0;i<80;i++){const d=document.createElement('div'); d.className='star'; d.style.left=((i*137)%97+1)+'%'; d.style.top=((i*73)%97+1)+'%'; d.style.width=d.style.height=((i%3)+1)+'px'; d.style.opacity=(.15+((i*7)%60)/100); d.style.animationDelay=(i*.13)+'s'; root.appendChild(d);}}
function baseGround(s){return s.t.includes('本拠')?1800:(s.t.includes('要塞')||s.t.includes('回廊門')||s.t.includes('聖域'))?1200:650}
function baseEco(s){return s.t.includes('本拠')?340:(s.t.includes('商港')||s.t.includes('租界'))?260:s.t.includes('工業')?230:170}
function mkStart(){const wrap=$('#startBtns'); wrap.innerHTML=''; Object.values(F).forEach(f=>{const b=document.createElement('button'); b.innerHTML=`<div>${f.name}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">難易度 ${f.diff}<br>${f.desc}</div>`; b.onclick=()=>newGame(f.id); wrap.appendChild(b);});}
function newGame(faction){
 G.player=faction; G.turn=1; G.ap=4; G.layer='軍務'; G.sheetOpen=true; G.selected=faction==='emp'?2:faction==='fed'?14:faction==='cult'?11:10; G.overlay=null; G.logs=['銀河作戦盤が起動した。']; G.chron=[]; G.cool={}; G.activePolicy=null;
 G.sectors=SRAW.map(s=>({id:s.id,name:s.n,owner:s.o,x:s.x,y:s.y,tags:[...s.t],econ:baseEco(s),order:s.o==='cult'?44:68,dev:s.t.includes('工業')?72:54,ground:baseGround(s),gmax:baseGround(s),infil:s.o==='cult'?65:10,contract:s.o==='corp'?58:12,revoltProt:0}));
 G.nations={emp:{money:520,will:64,prestige:58,anxiety:18,warlord:16},fed:{money:500,will:60,leg:72,support:62,parliament:28},cult:{money:390,will:54,faith:64,infil:38,fervor:24,forecast:{id:11,eta:3}},corp:{money:610,will:52,credit:68,contract:48,market:32}};
 G.fleets=[...Array.from({length:6},(_,i)=>({id:'E'+(i+1),side:'emp',name:'帝国第'+(i+1)+'艦隊',loc:[1,2,3,4,5,7][i],pow:980-(i>1?i*20:0),max:1020,sup:74-i*2,mor:76-i,fat:12+i*2,absent:0,garrison:0})),...Array.from({length:6},(_,i)=>({id:'F'+(i+1),side:'fed',name:'連邦第'+(i+1)+'艦隊',loc:[13,14,15,16,17,19][i],pow:970-(i>1?i*18:0),max:1020,sup:75-i*2,mor:75-i,fat:11+i*2,absent:0,garrison:0}))];
 $('#start').classList.add('hidden'); $('#hud').classList.remove('hidden'); $('#main').classList.remove('hidden'); $('#sheet').classList.remove('hidden'); render();
}
function currentSector(){return sector(G.selected)}
function etaEmpire(){const n=nation('emp'); return Math.max(1,Math.ceil((80-n.anxiety)/Math.max(1,1+Math.max(0,ownedBy('emp').length-10)*1.5)))}
function etaFed(){const n=nation('fed'); return Math.max(1,Math.ceil((70-n.parliament)/2))}
function etaCorp(){const n=nation('corp'); return Math.max(1,Math.ceil((90-n.market)/3))}
function crisisLabel(){const n=nation(own()); if(own()==='emp') return `皇統不安 ${n.anxiety} 内乱まで約${etaEmpire()}T`; if(own()==='fed') return `議会圧 ${n.parliament} 制約まで約${etaFed()}T`; if(own()==='cult') return `蜂起予告 ${sector(n.forecast.id).name} 約${n.forecast.eta}T`; return `市場圧 ${n.market} 崩壊まで約${etaCorp()}T`;}
function hudCards(){const n=nation(own()); if(own()==='emp') return [['威光',n.prestige],['皇統不安',n.anxiety],['軍閥圧',n.warlord],['支配宙域',ownedBy('emp').length]]; if(own()==='fed') return [['支持基盤',n.support],['議会圧',n.parliament],['正統性',n.leg],['支配宙域',ownedBy('fed').length]]; if(own()==='cult') return [['信仰熱',n.faith],['浸透圧',n.infil],['狂信化',n.fervor],['爆発候補',sector(n.forecast.id).name]]; return [['信用',n.credit],['市場圧',n.market],['契約密度',n.contract],['崩壊猶予',etaCorp()+'T']];}
function focalSectors(){return G.sectors.filter(s=>s.tags.includes('回廊門')||s.tags.includes('商港')||s.tags.includes('中継')||s.tags.includes('聖域')||s.tags.includes('焦点')||s.tags.includes('本拠'))}
function isThreatened(s){if(s.owner!==own()) return false; return ADJ[s.id].some(id=>sector(id).owner!==own())}
function genHints(){
 const res=[], mine=ownedBy(own());
 const weak=mine.filter(s=>s.ground/s.gmax<.55).sort((a,b)=>a.ground/a.gmax-b.ground/b.gmax)[0];
 if(weak) res.push({t:'🔥 '+weak.name+' 危機',s:`地力${Math.floor(weak.ground/s.gmax*100)}% 防衛再建が必要`});
 const focal=focalSectors().find(s=>s.owner!==own()||s.ground/s.gmax<.75); if(focal) res.push({t:'⚔ '+focal.name+' 制圧',s:'焦点宙域を押さえないと勝ち筋が細る'});
 const n=nation(own());
 if(own()==='emp'&&n.anxiety>=55) res.push({t:'⚠ 内乱接近',s:'広げすぎによる腐敗が進行している'});
 if(own()==='fed'&&n.parliament>=55) res.push({t:'⚠ 議会拘束',s:'前進か支持回復かの判断が必要'});
 if(own()==='cult') res.push({t:'☀ 蜂起予告',s:`${sector(n.forecast.id).name} が約${n.forecast.eta}ターン後に爆発候補`});
 if(own()==='corp'&&n.market>=60) res.push({t:'💹 市場崩壊接近',s:'短期利益が限界に近づいている'});
 return res.slice(0,3);
}
function renderHUD(){const f=F[own()]; $('#hud').innerHTML=`<div class="topLine"><div><div class="title">星暦戦記 <span style="color:${f.color}">${f.name}</span></div><div class="small">第${G.turn}ターン</div></div><button style="border:none;border-radius:14px;padding:10px 12px;background:rgba(255,255,255,.06);color:var(--text);font-weight:800" onclick="nextTurn()">次ターン</button></div><div class="badges"><span class="badge">${crisisLabel()}</span><span class="badge">AP ${G.ap}</span><span class="badge">資金 ${nation(own()).money}</span><span class="badge">戦意 ${nation(own()).will}</span></div><div class="kpis">${hudCards().map(x=>`<div class="kpi"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}</div><div class="hints">${genHints().map(h=>`<div class="hint"><div class="h">${h.t}</div><div class="s">${h.s}</div></div>`).join('')}</div>`;}
function mapSVG(){
 const glows=`<g class="regionGlow"><ellipse cx="260" cy="210" rx="260" ry="230" fill="rgba(213,172,84,.18)"/><ellipse cx="270" cy="780" rx="250" ry="240" fill="rgba(105,183,239,.16)"/><ellipse cx="800" cy="290" rx="190" ry="170" fill="rgba(184,121,255,.15)"/></g>`;
 const stars=Array.from({length:80},(_,i)=>`<circle cx="${(i*137)%1080+20}" cy="${(i*83)%1020+20}" r="${(i%3)+.8}" fill="rgba(255,255,255,${.18+((i*7)%50)/100})"/>`).join('');
 const lines=Object.entries(ADJ).flatMap(([a,arr])=>arr.filter(b=>+a<b).map(b=>{const s1=sector(+a),s2=sector(b),cls=(s1.tags.includes('回廊門')&&s2.tags.includes('回廊門'))||s1.tags.includes('焦点')||s2.tags.includes('焦点')?'line':'line minor'; return `<line class="${cls}" x1="${s1.x}" y1="${s1.y}" x2="${s2.x}" y2="${s2.y}"/>`; })).join('');
 const nodes=G.sectors.map(s=>{const o=F[s.owner], sel=s.id===G.selected, focal=focalSectors().some(x=>x.id===s.id), threat=isThreatened(s), low=s.ground/s.gmax<.55, infil=s.owner!==own()&&s.infil>=45; return `<g class="node" onclick="pickSector(${s.id})" style="cursor:pointer"><circle class="pulse" cx="${s.x}" cy="${s.y}" r="${focal?28:20}" fill="${focal?o.color:'transparent'}" opacity=".18"/><circle ${threat?`class="ring"`:''} cx="${s.x}" cy="${s.y}" r="${focal?30:22}" stroke="${threat?'var(--danger)':'transparent'}"/><circle class="core" cx="${s.x}" cy="${s.y}" r="${sel?16:13}" fill="${o.color}"/><text x="${s.x}" y="${s.y+4}" font-size="12" text-anchor="middle" fill="#fff">${o.short}</text><text x="${s.x}" y="${s.y-20}" font-size="11" text-anchor="middle" fill="#edf3ff">${s.name}</text>${low?`<text x="${s.x}" y="${s.y+34}" font-size="11" text-anchor="middle" fill="var(--warn)">⬡${Math.floor(s.ground/s.gmax*100)}%</text>`:''}${infil?`<text x="${s.x}" y="${s.y+48}" font-size="11" text-anchor="middle" fill="var(--cult)">☀${s.infil}%</text>`:''}</g>`;}).join('');
 return `<svg viewBox="0 0 1120 1040">${glows}${stars}${lines}${nodes}</svg>`;
}

function applyPolicy(k){if(G.ap<1){pushLog('AP不足。'); closeOverlay(); render(); return;} G.ap--; G.activePolicy={id:k,turns:(own()==='emp'||own()==='fed')?2:3}; const n=nation(own()); if(k==='levyall'){n.anxiety+=10;n.warlord+=6; pushLog('帝国が徴発総動員を発令。覇気の裏で腐敗の時計が進む。');} else if(k==='hearing'){n.support=clamp(n.support+18,0,100); n.parliament=clamp(n.parliament+6,0,100); pushLog('共和連邦が公聴連合を起動。支持は集まるが機動力は鈍る。');} else if(k==='fanatic'){n.faith=clamp(n.faith+12,0,100); n.fervor=clamp(n.fervor+14,0,100); pushLog('狂信派を取り込んだ。力は増すが制御は難しくなる。');} else if(k==='offer'){n.money+=70; n.market=clamp(n.market+12,0,100); pushLog('市場オファー。利益は大きいが世界の足場が滑る。');} else pushLog('政策を実行した。'); closeOverlay(); render();}

function renderOverlay(){const o=G.overlay, wrap=$('#overlay'); if(!o){wrap.className='hidden'; wrap.innerHTML=''; return;} wrap.className='overlay'; if(o.type==='policy'){wrap.innerHTML=`<div class="modal"><div class="big">危険政策</div><div class="sub">強いが代償のある選択です。</div><div class="list">${policyButtons().map(p=>`<button onclick="applyPolicy('${p.k}')"><div>${p.n}</div><div class="small">${p.d}</div></button>`).join('')}</div><button onclick="closeOverlay()">閉じる</button></div>`; return;} if(o.type==='role'){wrap.innerHTML=`<div class="modal"><div class="big">侵攻前の役割選択</div><div class="sub">${currentSector().name} から ${sector(o.target).name} へ侵攻。</div><div class="grid3">${Object.entries(ROLE).map(([k,v])=>`<button onclick="startBattle('${k}')"><div>${v.name}</div><div class="small">与ダメ ${v.dmg} 被害 ${v.taken}</div></button>`).join('')}</div><button onclick="closeOverlay()">中止</button></div>`; return;} if(o.type==='battle'){const b=G.battle, t=sector(b.sector), cmds=(b.type==='fleet'?TACTICS_F:TACTICS_O); wrap.innerHTML=`<div class="modal"><div class="big">${t.name} ${b.type==='fleet'?'艦隊戦':'占領戦'}</div><div class="sub">第${b.round}巡 / 役割 ${ROLE[b.role].name}</div><div class="grid3 battleBtns">${cmds.map(c=>`<button onclick="resolveBattle('${c}')">${c}</button>`).join('')}</div><div class="list">${b.log.slice(0,5).map(x=>`<div class="logItem">${x}</div>`).join('')}</div><button onclick="closeOverlay()">戦況を閉じる</button></div>`; }}
function act(k){
 const s=currentSector(), p=own(), n=nation(p); const spend=v=>G.ap=Math.max(0,G.ap-v);
 if(G.layer==='情報'){if(k==='intel') pushLog(genHints().map(x=>x.t+' — '+x.s).join(' / ')); if(k==='focus') pushLog('焦点宙域: '+focalSectors().map(x=>x.name).join('、')); if(k==='chrono') pushLog((G.chron[0]||'年代記はまだ浅い。')); render(); return;}
 if(G.ap<=0){pushLog('行動点が尽きている。次ターンで戦況を進めてください。'); render(); return;}
 if(k==='fort'){spend(1); s.gmax+=120; s.ground=clamp(s.ground+70,0,s.gmax); pushLog(`${s.name} を要塞化。地力上限が増した。`);}
 else if(k==='move'){const fs=myFleetsAt(s.id)[0]; if(!fs){pushLog('この宙域に自軍艦隊がいない。'); render(); return;} const to=ADJ[s.id].find(id=>sector(id).owner===p); if(!to){pushLog('移駐先がない。'); render(); return;} spend(1); fs.loc=to; G.selected=to; pushLog(`${fs.name} が ${sector(to).name} へ移駐した。`);}
 else if(k==='repair'){const fs=myFleetsAt(s.id)[0]; if(!fs){pushLog('整備対象の艦隊がいない。'); render(); return;} spend(1); fs.pow=clamp(fs.pow+120,0,fs.max); fs.sup=clamp(fs.sup+18,0,100); fs.mor=clamp(fs.mor+8,0,100); fs.fat=clamp(fs.fat-10,0,100); n.money-=30; pushLog(`${fs.name} を整備。現戦力と補給が持ち直した。`);}
 else if(['guard','holy','gather','ward','escort','supply','hub'].includes(k)){spend(1); s.ground=clamp(s.ground+90,0,s.gmax); s.order=clamp(s.order+5,0,100); pushLog(`${s.name} の防備を強めた。`);}
 else if(['develop','restore','market','trade'].includes(k)){spend(1); s.econ+=18; s.dev=clamp(s.dev+10,0,100); s.order=clamp(s.order+4,0,100); n.money-=24; pushLog(`${s.name} の基盤を育てた。`);}
 else if(k==='levy'){spend(1); s.econ+=10; s.order=clamp(s.order-8,0,100); n.money+=55; if(n.anxiety!==undefined) n.anxiety=clamp(n.anxiety+6,0,100); pushLog(`${s.name} で徴発。資金は増えたが、不満も滲む。`);}
 else if(['recover','support','peace','auto','ritual','offer','sanct','pilgrim','loan','contract'].includes(k)){spend(1); if(p==='cult'){s.infil=clamp(s.infil+10,0,100); nation('cult').faith=clamp(nation('cult').faith+6,0,100);} else if(p==='corp'){s.contract=clamp(s.contract+12,0,100); nation('corp').market=clamp(nation('corp').market+6,0,100); n.money+=30;} else {s.order=clamp(s.order+8,0,100); s.dev=clamp(s.dev+5,0,100);} pushLog(`${s.name} で ${currentActions().find(a=>a.k===k).l} を実施。`);}
 else if(['press','purge','spy','block','work','prop','relief','coord','infil','agitate','uprise','rite','mpress','cut','collect','intervene'].includes(k)){spend(1); if(p==='cult'){s.infil=clamp(s.infil+14,0,100); s.order=clamp(s.order-8,0,100); nation('cult').infil=clamp(nation('cult').infil+6,0,100);} else if(p==='corp'){s.contract=clamp(s.contract+10,0,100); nation('corp').market=clamp(nation('corp').market+8,0,100);} else {s.order=clamp(s.order-6,0,100);} pushLog(`${s.name} に対する ${currentActions().find(a=>a.k===k).l} が進んだ。`);}
 render();
}
function tacticBonus(a,d){const win={砲撃:'攪乱',攪乱:'突撃',突撃:'砲撃',制圧:'浸透',浸透:'強襲',強襲:'制圧'}; return a===d?0:(win[a]===d?1:-1)}
function startBattle(roleKey){const s=currentSector(), target=sector(G.overlay.target), attackers=myFleetsAt(s.id).slice(0,Math.min(2,myFleetsAt(s.id).length)).map(f=>f.id); if(!attackers.length){pushLog('侵攻に使える艦隊がいない。'); closeOverlay(); render(); return;} G.ap=Math.max(0,G.ap-2); G.battle={type:enemyFleetsAt(target.id).length?'fleet':'occupy',sector:target.id,attackers,defenders:enemyFleetsAt(target.id).map(f=>f.id),round:1,role:roleKey,log:[`${target.name} への侵攻開始。${ROLE[roleKey].name} を採用。`],momentum:0}; G.overlay={type:'battle'}; renderOverlay();}
function retreatFleet(f){const opts=ADJ[f.loc].filter(id=>sector(id).owner===f.side); if(opts.length){f.loc=opts[Math.floor(Math.random()*opts.length)]; f.pow=260; pushLog(`${f.name} は ${sector(f.loc).name} へ敗走した。`);} else {f.loc=null; f.absent=5; f.pow=0; pushLog(`${f.name} は退避先を失い、5ターン不在となった。`);}}
function resolveBattle(cmd){
 const b=G.battle, t=sector(b.sector), role=ROLE[b.role], def=(b.type==='fleet'?TACTICS_F:TACTICS_O)[Math.floor(Math.random()*3)], bonus=tacticBonus(cmd,def)+role.init;
 const attF=G.fleets.filter(f=>b.attackers.includes(f.id)), defF=G.fleets.filter(f=>b.defenders.includes(f.id));
 const attP=attF.reduce((a,f)=>a+f.pow*(0.64+f.sup/300+f.mor/350),0)*role.dmg*(1+Math.min(.12,b.momentum*.04));
 const defP=(defF.reduce((a,f)=>a+f.pow*(0.66+f.sup/300+f.mor/350),0)||t.ground)*(1+(bonus<0?.08:0));
 if(b.type==='fleet'){
   const attLoss=Math.max(70,Math.round(defP*(bonus<0?.18:.11)*role.taken/Math.max(1,attF.length)));
   const defLoss=Math.max(80,Math.round(attP*(bonus>0?.20:.12)/Math.max(1,Math.max(1,defF.length))));
   attF.forEach(f=>{f.pow=clamp(f.pow-attLoss,0,f.max); f.sup=clamp(f.sup-7,0,100); f.mor=clamp(f.mor-(bonus<0?8:3),0,100)});
   defF.forEach(f=>{f.pow=clamp(f.pow-defLoss,0,f.max); f.sup=clamp(f.sup-8,0,100); f.mor=clamp(f.mor-(bonus>0?8:3),0,100)});
   const dead=defF.filter(f=>f.pow<=0); dead.forEach(retreatFleet);
   b.log.unshift(`主攻 ${cmd} / 敵 ${def}。${dead.length?dead.map(x=>x.name).join('、')+' が潰走。':'決着せず。'}`); b.round++; b.momentum=bonus>0?b.momentum+1:0;
   if(enemyFleetsAt(t.id).length===0){chron(`血染めの ${t.name} 会戦`); b.type='occupy'; b.defenders=[]; b.log.unshift(`${t.name} の宙域制圧に成功。占領戦へ移行。`);}
 } else {
   const occLoss=Math.max(140,Math.round(attP*(bonus>0?.22:.16))), counter=Math.max(60,Math.round(t.ground*(bonus<0?.10:.06)/Math.max(1,attF.length)));
   t.ground=clamp(t.ground-occLoss,0,t.gmax); attF.forEach(f=>{f.pow=clamp(f.pow-counter,0,f.max); f.sup=clamp(f.sup-5,0,100)});
   b.log.unshift(`主攻 ${cmd} / 敵 ${def}。${t.name} の地力は ${t.ground} まで低下。`); b.round++;
   if(t.ground<=0){t.owner=own(); t.ground=220; t.order=Math.max(25,t.order-10); attF.forEach(f=>{f.loc=t.id; f.garrison=3;}); chron(`落陽の ${t.name} 制圧`); pushLog(`${t.name} を占領。3ターン駐留が発生。`); G.overlay=null; G.battle=null; render(); return;}
 }
 renderOverlay(); render();
}
function processReturns(){G.fleets.forEach(f=>{if(f.absent>0){f.absent--; if(f.absent===0){f.loc=f.side==='emp'?1:16; f.pow=Math.round(f.max*.5); f.sup=50; f.mor=46; pushLog(`${f.name} が本拠へ帰還した。`);}}})}
function processGarrison(){G.fleets.forEach(f=>{if(f.garrison>0) f.garrison--})}
function naturalRecovery(){G.sectors.forEach(s=>{const rate=s.tags.includes('本拠')?.12:(s.tags.includes('要塞')||s.tags.includes('回廊門')||s.tags.includes('聖域'))?.10:.08; s.ground=clamp(s.ground+Math.max(35,Math.round(s.gmax*rate)),0,s.gmax); s.order=clamp(s.order+(s.owner==='corp'?-1:1),0,100); s.revoltProt=Math.max(0,s.revoltProt-1);}); G.fleets.forEach(f=>{if(f.absent===0){const isolated=f.loc&&ADJ[f.loc].every(id=>sector(id).owner!==f.side); f.pow=clamp(f.pow+(isolated?30:110),0,f.max); f.sup=clamp(f.sup+(isolated?2:16),0,100); f.mor=clamp(f.mor+(isolated?2:8),0,100); f.fat=clamp(f.fat-(isolated?1:9),0,100)}})}
function processEvents(){
 const target=G.sectors.find(s=>s.owner!=='cult'&&s.infil>=70&&s.order<=20&&s.revoltProt===0&&(G.cool['cultMutation']||0)<=0);
 if(target){target.order=10; target.ground=clamp(target.ground-120,0,target.gmax); target.revoltProt=4; target.owner='cult'; G.cool['cultMutation']=4; pushLog(`${target.name} で後方突然変異。静かな後背が戦線へ変わった。`); chron(`${target.name} にて後方突然変異`);}
 if(own()==='corp' && G.turn%3===0 && (G.cool['marketOffer']||0)<=0){nation('corp').money+=70; nation('corp').market=clamp(nation('corp').market+8,0,100); G.cool['marketOffer']=3; pushLog('市場オファー。補給契約と封鎖情報が売りに出され、戦場の選択肢そのものが歪んだ。');}
 Object.keys(G.cool).forEach(k=>G.cool[k]=Math.max(0,G.cool[k]-1));
}
function updatePressures(){
 const emp=nation('emp'), fed=nation('fed'), cult=nation('cult'), corp=nation('corp');
 emp.anxiety=clamp(emp.anxiety+1+Math.max(0,ownedBy('emp').length-10)*1.5+G.sectors.filter(s=>s.owner==='emp'&&s.order<50).length*.6,0,100);
 emp.warlord=clamp(emp.warlord+(G.turn>=10?2:1)+(emp.anxiety>60?2:0),0,100);
 if(emp.anxiety>80&&Math.random()<.35){const cand=ownedBy('emp').filter(s=>s.id!==1).sort((a,b)=>a.order-b.order)[0]; if(cand){cand.owner='cult'; cand.revoltProt=3; pushLog(`${cand.name} が離反し、帝国の支配がひび割れた。`); chron(`${cand.name} 離反事件`);}}
 fed.support=clamp(fed.support-1-(G.logs[0]&&G.logs[0].includes('占領')?0:1),0,100); fed.parliament=clamp(fed.parliament+1+(fed.support<50?2:0)+(G.turn>=10?1:0),0,100);
 const hot=G.sectors.filter(s=>s.owner!=='cult'&&s.infil>=70&&s.order<=20&&s.revoltProt===0); cult.forecast=hot[0]?{id:hot[0].id,eta:1}:{id:11,eta:Math.max(1,3-Math.floor(cult.infil/30))}; cult.faith=clamp(cult.faith+(hot.length?4:-2)+(sector(11).owner==='cult'?2:-4),0,100); cult.infil=clamp(cult.infil+2,0,100); cult.fervor=clamp(cult.fervor+(G.turn>=10?2:1),0,100);
 corp.market=clamp(corp.market+3+(G.activePolicy&&G.activePolicy.id==='offer'?3:0)+(G.turn>=10?2:0),0,100); corp.contract=clamp(corp.contract+2,0,100);
 if(corp.market>=90){corp.money=Math.max(0,corp.money-180); ['emp','fed'].forEach(id=>ownedBy(id).forEach(s=>s.econ=Math.max(80,s.econ-12))); corp.market=62; pushLog('市場崩壊イベント。利益の塔が軋み、全陣営の経済が傷ついた。'); chron('大暴落の予兆が現実となった');}
}
function resolvePolicyBacklash(){const n=nation(own()); if(G.activePolicy?.id==='levyall'){ownedBy('emp').slice(0,3).forEach(s=>s.order=clamp(s.order-18,0,100)); n.anxiety=clamp(n.anxiety+12,0,100); pushLog('徴発総動員の反動。不穏が複数宙域で噴き上がった。');} if(G.activePolicy?.id==='hearing'){G.ap=Math.max(3,G.ap-1); pushLog('公聴連合の反動。意思統一の遅れが機動力を鈍らせる。');}}
function nextTurn(){if(G.overlay&&G.overlay.type==='battle'){pushLog('会戦中はターンを進められない。'); render(); return;} G.turn++; G.ap=(own()==='fed'&&nation('fed').parliament>=70)?3:4; processReturns(); processGarrison(); naturalRecovery(); updatePressures(); processEvents(); if(G.activePolicy){G.activePolicy.turns--; if(G.activePolicy.turns<=0){resolvePolicyBacklash(); G.activePolicy=null;}} render();}
mkStart(); mkStars();
</script>
